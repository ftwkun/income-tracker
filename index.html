  });

  const del = document.createElement('button');
  del.className = 'fc-del'; del.textContent = '×';
  del.onclick = function() { state.fc.incomes.splice(idx, 1); logAction(); save(); renderFcIncomes(); };

  row1.appendChild(dateInp); row1.appendChild(sumInp); row1.appendChild(srcSel); row1.appendChild(del);

  const freqLabels = ['раз','день','нед','мес','год'];
  const freqVals = ['once','daily','weekly','monthly','yearly'];
  const freqRow = document.createElement('div');
  freqRow.className = 'fc-freq';
  freqLabels.forEach(function(f, fi) {
    const btn = document.createElement('button');
    btn.className = 'fc-freq-btn' + ((e.freq || 'monthly') === freqVals[fi] ? ' active' : '');
    btn.textContent = f;
    btn.onclick = function() {
      freqRow.querySelectorAll('.fc-freq-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    };
    freqRow.appendChild(btn);
  });

  div.appendChild(row1); div.appendChild(freqRow);
  return div;
}

function fcAddIncome() {
  if (!state.fc.incomes) state.fc.incomes = [];
  state.fc.incomes = getFcIncomes();
  const firstSrc = state.sources[0];
  state.fc.incomes.push({ date: today(), sum: '', srcId: firstSrc ? firstSrc.id : '', freq: 'monthly' });
  renderFcIncomes();
}

function getFcIncomes() {
  const rows = document.getElementById('fc-incomes').querySelectorAll('div[style]');
  const freqVals = ['once','daily','weekly','monthly','yearly'];
  const result = [];
  rows.forEach(function(row) {
    const dateInp = row.querySelector('input[type=date]');
    const sumInp = row.querySelector('input[type=number]');
    const srcSel = row.querySelector('select');
    const freqBtns = row.querySelectorAll('.fc-freq-btn');
    let freq = 'monthly';
    freqBtns.forEach(function(btn, i) { if (btn.classList.contains('active')) freq = freqVals[i]; });
    if (dateInp && sumInp && srcSel && parseFloat(sumInp.value)) {
      result.push({ date: dateInp.value, sum: sumInp.value, srcId: srcSel.value, freq: freq });
    }
  });
  return result;
}

function fcIncCalc() {
  state.fc.incomes = getFcIncomes();
  save();

  const startDate = today();
  const allDays = daysInYear(state.year);
  const futureDays = allDays.filter(function(ds) { return ds >= startDate; });
  if (!futureDays.length) { closeIncForecast(); return; }
  const lastDay = futureDays[futureDays.length - 1];

  const expanded = fcExpand(state.fc.incomes.map(function(r) {
    return { date: r.date, sum: parseFloat(r.sum) || 0, freq: r.freq, srcId: r.srcId };
  }), startDate, lastDay);

  expanded.forEach(function(e) {
    if (!e.srcId) return;
    const existing = getCell(e.date, e.srcId).value;
    if (existing && parseFloat(existing) !== 0) return; // не трогать ручной ввод
    setCell(e.date, e.srcId, String(Math.round(e.sum)));
  });

  logAction();
  save();
  closeIncForecast();
  renderMatrix();
}

function toggleSourcesCols() {
  const matrix = document.getElementById('matrix');
  const btn = document.getElementById('btn-collapse-src');
  if (!matrix) return;
  const collapsed = matrix.classList.toggle('sources-collapsed');
  btn.classList.toggle('active', collapsed);
  btn.textContent = collapsed ? '⊞' : '⊟';
  state.sourcesCollapsed = collapsed;
  save();
  recalcAllTotals();
}

// ── Settings & Pack/Unpack ─────────────────────────────────────────────
const IT_EPOCH = new Date('2020-01-01').getTime();
const MS_DAY = 86400000;

function dateToDay16(ds) {
  if (!ds) return -1;
  return Math.round((new Date(ds).getTime() - IT_EPOCH) / MS_DAY);
}
function day16ToDate(d) {
  if (d < 0) return '';
  return new Date(IT_EPOCH + d * MS_DAY).toISOString().split('T')[0];
}
function encStr(s, maxBytes) {
  const b = new TextEncoder().encode((s || '').slice(0, 20));
  return b.slice(0, maxBytes);
}

function packData() {
  const sources = state.sources || [];
  const cells = state.cells || {};
  const fc = state.fc || {};
  const fcExpenses = fc.expenses || [];
  const fcIncomes = fc.incomes || [];
  const freqVals = ['once','daily','weekly','monthly','yearly'];

  // collect non-empty cells
  const cellEntries = [];
  Object.keys(cells).forEach(function(key) {
    const cell = cells[key];
    const v = parseFloat(cell.value);
    if (isNaN(v) || v === 0) return;
    const parts = key.split('|');
    if (parts.length !== 2) return;
    const ds = parts[0], srcId = parts[1];
    const srcIdx = sources.findIndex(function(s) { return s.id === srcId; });
    if (srcIdx < 0) return;
    cellEntries.push({ ds, srcIdx, v, history: cell.history || [] });
  });

  // collect non-empty spends
  const spendEntries = Object.keys(state.spends || {}).filter(function(ds) {
    const v = parseFloat(state.spends[ds]);
    return !isNaN(v) && v !== 0;
  });

  // encode fc expense labels
  const enc = new TextEncoder();
  const expLabels = fcExpenses.map(function(e) { return enc.encode((e.label || '').slice(0, 60)); });

  // estimate size
  let size = 4 + 1 + sources.length * 15; // +1 flags byte per source
  cellEntries.forEach(function(c) { size += 8 + c.history.length * 7; });
  size += 2 + spendEntries.length * 6;
  size += 11; // fc header: balDate(2)+balVal(4)+limit(4)+expCount(1)
  fcExpenses.forEach(function(e, i) { size += 8 + expLabels[i].length; });
  size += 1 + fcIncomes.length * 8; // incomeCount(1) + srcIdx(1)+date(2)+sum(4)+freq(1) each
  const overrideEntries = Object.keys(state.expOverrides || {}).map(function(k) {
    const p = k.split('|'); return { ds: p[0], idx: parseInt(p[1]) || 0, v: parseInt(state.expOverrides[k]) || 0 };
  }).filter(function(e) { return e.ds && !isNaN(e.idx); });
  size += 2 + overrideEntries.length * 7; // count(2) + day16(2)+idx(1)+val(4) each
  size += 4; // safety

  const buf = new ArrayBuffer(size + 512);
  const dv = new DataView(buf);
  let pos = 0;

  dv.setUint8(pos++, 0x49); // 'I'
  dv.setUint8(pos++, 0x54); // 'T'
  dv.setUint8(pos++, 0x07); // version 7
  dv.setInt16(pos, state.year || new Date().getFullYear(), false); pos += 2;

  // sources (v4: +1 byte flags: bit0=noBalance)
  dv.setUint8(pos++, sources.length);
  sources.forEach(function(s) {
    const code = enc.encode((s.code || '').slice(0, 6));
    dv.setUint8(pos++, code.length);
    code.forEach(function(b) { dv.setUint8(pos++, b); });
    dv.setInt16(pos, dateToDay16(s.start), false); pos += 2;
    dv.setInt16(pos, dateToDay16(s.end), false); pos += 2;
    let h = 0;
    for (var i = 0; i < s.id.length; i++) h = (h * 31 + s.id.charCodeAt(i)) & 0xFFFFFFFF;
    dv.setInt32(pos, h, false); pos += 4;
    dv.setUint8(pos++, s.noBalance ? 1 : 0); // flags
  });

  // cells
  dv.setUint16(pos, cellEntries.length, false); pos += 2;
  cellEntries.forEach(function(c) {
    dv.setUint8(pos++, c.srcIdx);
    dv.setInt16(pos, dateToDay16(c.ds), false); pos += 2;
    dv.setInt32(pos, Math.round(c.v), false); pos += 4;
    const hist = c.history.filter(function(h) { return h.value !== '' && !isNaN(parseFloat(h.value)); });
    dv.setUint8(pos++, Math.min(hist.length, 15));
    hist.slice(-15).forEach(function(h) {
      dv.setInt32(pos, Math.round(parseFloat(h.value)), false); pos += 4;
      const mins = Math.round(new Date(h.ts).getTime() / 60000);
      dv.setUint32(pos, mins >>> 0, false); pos += 4;
    });
  });

  // spends
  dv.setUint16(pos, spendEntries.length, false); pos += 2;
  spendEntries.forEach(function(ds) {
    dv.setInt16(pos, dateToDay16(ds), false); pos += 2;
    dv.setInt32(pos, Math.round(parseFloat(state.spends[ds])), false); pos += 4;
  });

  // fc
  dv.setInt16(pos, dateToDay16(fc.balDate), false); pos += 2;
  dv.setInt32(pos, Math.round(parseFloat(fc.balVal) || 0), false); pos += 4;
  dv.setInt32(pos, Math.round(parseFloat(fc.limit) || 0), false); pos += 4;
  dv.setUint8(pos++, Math.min(fcExpenses.length, 255));
  fcExpenses.forEach(function(e, i) {
    dv.setInt16(pos, dateToDay16(e.date), false); pos += 2;
    dv.setInt32(pos, Math.round(parseFloat(e.sum) || 0), false); pos += 4;
    dv.setUint8(pos++, Math.max(0, freqVals.indexOf(e.freq || 'once')));
    const lb = expLabels[i];
    dv.setUint8(pos++, lb.length);
    lb.forEach(function(b) { dv.setUint8(pos++, b); });
  });

  // fc.incomes
  dv.setUint8(pos++, Math.min(fcIncomes.length, 255));
  fcIncomes.forEach(function(e) {
    const srcIdx = sources.findIndex(function(s) { return s.id === e.srcId; });
    dv.setUint8(pos++, srcIdx >= 0 ? srcIdx : 0);
    dv.setInt16(pos, dateToDay16(e.date), false); pos += 2;
    dv.setInt32(pos, Math.round(parseFloat(e.sum) || 0), false); pos += 4;
    dv.setUint8(pos++, Math.max(0, freqVals.indexOf(e.freq || 'monthly')));
  });

  // expOverrides (IT7)
  dv.setUint16(pos, overrideEntries.length, false); pos += 2;
  overrideEntries.forEach(function(e) {
    dv.setInt16(pos, dateToDay16(e.ds), false); pos += 2;
    dv.setUint8(pos++, e.idx);
    dv.setInt32(pos, e.v, false); pos += 4;
  });

  const bytes = new Uint8Array(buf, 0, pos);
  let hex = 'IT7';
  bytes.forEach(function(b) { hex += b.toString(16).padStart(2,'0'); });
  return hex;
}

function unpackData(str) {
  if (!str.startsWith('IT2') && !str.startsWith('IT3') && !str.startsWith('IT4') && !str.startsWith('IT5') && !str.startsWith('IT6') && !str.startsWith('IT7')) throw new Error('bad format');
  const hexStr = str.slice(3);
  const bytes = new Uint8Array(hexStr.length / 2);
  for (var i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(hexStr.slice(i*2, i*2+2), 16);
  }
  const dv = new DataView(bytes.buffer);
  let pos = 0;

  if (dv.getUint8(pos++) !== 0x49 || dv.getUint8(pos++) !== 0x54) throw new Error('bad magic');
  const ver = dv.getUint8(pos++);
  const year = dv.getInt16(pos, false); pos += 2;

  const dec = new TextDecoder();
  const freqVals = ['once','daily','weekly','monthly','yearly'];

  const srcCount = dv.getUint8(pos++);
  const sources = [];
  for (var i = 0; i < srcCount; i++) {
    const clen = dv.getUint8(pos++);
    const codeBytes = bytes.slice(pos, pos + clen); pos += clen;
    const code = dec.decode(codeBytes);
    const start = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const end = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const hash = dv.getInt32(pos, false); pos += 4;
    const flags = ver >= 4 ? dv.getUint8(pos++) : 0;
    sources.push({ id: 'src_' + hash, code: code, name: '', start: start, end: end, noBalance: !!(flags & 1) });
  }

  const cellCount = dv.getUint16(pos, false); pos += 2;
  const cells = {};
  for (var j = 0; j < cellCount; j++) {
    const srcIdx = dv.getUint8(pos++);
    const ds = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const value = String(dv.getInt32(pos, false)); pos += 4;
    const histCount = dv.getUint8(pos++);
    const history = [];
    for (var k = 0; k < histCount; k++) {
      const hval = String(dv.getInt32(pos, false)); pos += 4;
      let mins;
      if (ver >= 6) { mins = dv.getUint32(pos, false); pos += 4; }
      else { mins = (dv.getUint8(pos) << 16) | (dv.getUint8(pos+1) << 8) | dv.getUint8(pos+2); pos += 3; }
      const ts = new Date(mins * 60000).toISOString();
      history.push({ value: hval, ts: ts });
    }
    if (srcIdx < sources.length) {
      const key = ds + '|' + sources[srcIdx].id;
      cells[key] = { value: value, history: history };
    }
  }

  const spends = {};
  if (ver >= 3) {
    const spendCount = dv.getUint16(pos, false); pos += 2;
    for (var m = 0; m < spendCount; m++) {
      const ds = day16ToDate(dv.getInt16(pos, false)); pos += 2;
      const v = dv.getInt32(pos, false); pos += 4;
      if (ds) spends[ds] = String(v);
    }
  }

  let fc = { balDate: '', balVal: '', limit: '', expenses: [], incomes: [] };
  if (ver >= 4) {
    fc.balDate = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const balVal = dv.getInt32(pos, false); pos += 4;
    fc.balVal = balVal !== 0 ? String(balVal) : '';
    const limit = dv.getInt32(pos, false); pos += 4;
    fc.limit = limit !== 0 ? String(limit) : '';
    const expCount = dv.getUint8(pos++);
    for (var n = 0; n < expCount; n++) {
      const eDate = day16ToDate(dv.getInt16(pos, false)); pos += 2;
      const eSum = dv.getInt32(pos, false); pos += 4;
      const eFreq = freqVals[dv.getUint8(pos++)] || 'once';
      const llen = dv.getUint8(pos++);
      const label = dec.decode(bytes.slice(pos, pos + llen)); pos += llen;
      fc.expenses.push({ date: eDate, sum: eSum !== 0 ? String(eSum) : '', label: label, freq: eFreq });
    }
  }
  if (ver >= 5) {
    const incCount = dv.getUint8(pos++);
    for (var p = 0; p < incCount; p++) {
      const srcIdx = dv.getUint8(pos++);
      const iDate = day16ToDate(dv.getInt16(pos, false)); pos += 2;
      const iSum = dv.getInt32(pos, false); pos += 4;
      const iFreq = freqVals[dv.getUint8(pos++)] || 'monthly';
      const srcId = srcIdx < sources.length ? sources[srcIdx].id : '';
      if (srcId) fc.incomes.push({ srcId: srcId, date: iDate, sum: iSum !== 0 ? String(iSum) : '', freq: iFreq });
    }
  }

  const expOverrides = {};
  if (ver >= 7) {
    const ovCount = dv.getUint16(pos, false); pos += 2;
    for (var q = 0; q < ovCount; q++) {
      const ovDs = day16ToDate(dv.getInt16(pos, false)); pos += 2;
      const ovIdx = dv.getUint8(pos++);
      const ovVal = dv.getInt32(pos, false); pos += 4;
      if (ovDs) expOverrides[ovDs + '|' + ovIdx] = String(ovVal);
    }
  }

  return { sources: sources, cells: cells, year: year, spends: spends, fc: fc, expOverrides: expOverrides };
}

function openSettings() {
  document.getElementById('export-field').value = '';
  document.getElementById('import-field').value = '';
  // show size info
  const packed = packData();
  document.getElementById('export-field').value = packed;
  document.getElementById('export-size').textContent = packed.length + ' б';
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}

function doExport() {
  const field = document.getElementById('export-field');
  field.select();
  try { document.execCommand('copy'); } catch(e) {}
  field.style.borderColor = 'var(--accent)';
  setTimeout(function() { field.style.borderColor = ''; }, 1500);
}

function doImport() {
  const raw = document.getElementById('import-field').value;
  // strip newlines, spaces and non-printable chars
  const input = raw.replace(/[^a-fA-F0-9IT]/g, '').trim();
  const field = document.getElementById('import-field');
  try {
    const newState = unpackData(input);
    state = Object.assign({}, newState, {
      spends: newState.spends || state.spends,
      fc: (newState.fc && (newState.fc.balVal || newState.fc.balDate || newState.fc.limit || newState.fc.expenses.length)) ? newState.fc : state.fc
    });
    initState();
    save();
    field.style.borderColor = 'var(--accent)';
    setTimeout(function() {
      field.style.borderColor = '';
      closeSettings();
      if (mode === 'matrix') renderMatrix();
      else renderDay();
    }, 800);
  } catch(e) {
    field.style.borderColor = 'var(--danger)';
    setTimeout(function() { field.style.borderColor = ''; }, 1500);
  }
}

function doClearHistory() {
  if (!confirm('Очистить историю изменений? Значения в ячейках останутся.')) return;
  Object.keys(state.cells).forEach(function(key) {
    if (state.cells[key].history) state.cells[key].history = [];
  });
  save();
  closeSettings();
  renderMatrix();
}

function doClear() {
  if (!confirm('Очистить все данные?')) return;
  state = { sources: [], cells: {}, year: new Date().getFullYear() };
  save();
  closeSettings();
  if (mode === 'matrix') renderMatrix();
  else renderDay();
}

// ── Sources ────────────────────────────────────────────────────────────
function openSources() {
  renderSources();
  document.getElementById('sources-panel').classList.add('open');
}

function closeSources() {
  document.getElementById('sources-panel').classList.remove('open');
  save();
  if (mode === 'matrix') renderMatrix();
  else renderDay();
}

function renderSources() {
  const list = document.getElementById('src-list');
  let html = '';
  state.sources.forEach(function(s, i) {
    html += '<div class="src-item" data-idx="' + i + '">';
    html += '<input class="src-code-input" value="' + s.code + '" maxlength="4" placeholder="КОД" data-field="code" data-idx="' + i + '">';
    html += '<input class="src-name-input" value="' + (s.name||'') + '" placeholder="название" data-field="name" data-idx="' + i + '">';
    html += '<div class="src-dates">';
    html += '<input class="src-date-input" type="date" value="' + (s.start||'') + '" placeholder="начало" data-field="start" data-idx="' + i + '">';
    html += '<input class="src-date-input" type="date" value="' + (s.end||'') + '" placeholder="конец" data-field="end" data-idx="' + i + '">';
    html += '</div>';
    html += '<label class="src-nobal"><input type="checkbox" data-field="noBalance" data-idx="' + i + '"' + (s.noBalance ? ' checked' : '') + '> не учитывать в балансе</label>';
    html += '<button class="src-del" data-idx="' + i + '">×</button>';
    html += '</div>';
  });
  list.innerHTML = html;

  list.querySelectorAll('input[data-field]:not([type="checkbox"])').forEach(function(inp) {
    inp.addEventListener('change', function() {
      const idx = parseInt(this.dataset.idx);
      state.sources[idx][this.dataset.field] = this.value;
      save();
    });
  });
  list.querySelectorAll('input[type="checkbox"][data-field]').forEach(function(chk) {
    chk.addEventListener('change', function() {
      const idx = parseInt(this.dataset.idx);
      state.sources[idx][this.dataset.field] = this.checked;
      save();
      recalcAllTotals();
    });
  });
  list.querySelectorAll('.src-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      state.sources.splice(idx, 1);
      renderSources();
    });
  });
}

function addSource() {
  state.sources.push({
    id: 'src_' + Date.now(),
    code: 'NEW',
    name: '',
    start: today(),
    end: '',
    noBalance: false
  });
  renderSources();
}

// ── History ────────────────────────────────────────────────────────────
function showHist(date, srcId) {
  const cell = getCell(date, srcId);
  const src = state.sources.find(function(s) { return s.id === srcId; });
  const code = src ? src.code : srcId;
  document.getElementById('hist-title').textContent = code + ' · ' + fmtDate(date);
  const list = document.getElementById('hist-list');
  const all = cell.history.slice().reverse();
  if (all.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 0;">нет истории</div>';
  } else {
    list.innerHTML = all.map(function(h) {
      return '<div class="hist-row"><span class="hist-ts">' + fmtTs(h.ts) + '</span><span class="hist-val">' + (h.value || '—') + '</span></div>';
    }).join('');
  }
  document.getElementById('hist-popup').classList.add('open');
}

function showDebug() {
  const limitV = parseFloat(state.fc && state.fc.limit) || 0;
  const days = daysInYear(state.year);
  const dayExpMap = buildDayExpensesMap(days);

  // ── ошибки ──
  const rows = [];
  days.forEach(function(ds) {
    const sp = parseFloat(state.spends[ds]) || 0;
    if (sp <= 0) return;
    const bigSum = (dayExpMap[ds] || []).reduce(function(a, e) { return a + (parseFloat(e.sum) || 0); }, 0);
    const err = limitV > 0 ? limitV - (sp - bigSum) : null;
    rows.push({ ds: ds, sp: sp, bigSum: bigSum, err: err });
  });

  // ── события таймлайна (откуда берутся синие точки) ──
  const events = []; // { dayStr, time, what }
  Object.keys(state.cells).forEach(function(key) {
    const cell = state.cells[key];
    if (!cell || !cell.history) return;
    const parts = key.split('|');
    const datePart = parts[0];
    const src = state.sources.find(function(s) { return s.id === parts[1]; });
    cell.history.forEach(function(h) {
      if (!h.ts) return;
      const d = new Date(h.ts);
      if (isNaN(d)) return;
      events.push({ ts: d.getTime(), dayStr: h.ts.slice(0,10), time: h.ts.slice(11,16), what: 'доход ' + (src ? src.code : parts[1]) + ' → ' + datePart, val: h.value });
    });
  });
  Object.keys(state.spendHistory || {}).forEach(function(ds) {
    (state.spendHistory[ds] || []).forEach(function(h) {
      if (!h.ts) return;
      const d = new Date(h.ts);
      if (isNaN(d)) return;
      events.push({ ts: d.getTime(), dayStr: h.ts.slice(0,10), time: h.ts.slice(11,16), what: 'трат ' + ds, val: h.value });
    });
  });
  (state.actionLog || []).forEach(function(ds) {
    events.push({ ts: new Date(ds + 'T23:59:59').getTime(), dayStr: ds, time: '23:59', what: 'расчёт прогноза', val: '' });
  });
  events.sort(function(a, b) { return b.ts - a.ts; }); // свежие сверху

  const MS = 'font-family:var(--mono);font-size:10px;';
  const MH = 'font-size:9px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;';

  let html = '';

  // блок ошибок
  html += '<div style="' + MH + 'padding:4px 0 6px;">ошибки трат</div>';
  if (!rows.length) {
    html += '<div style="' + MS + 'color:var(--muted);padding:4px 0 10px;">нет данных</div>';
  } else {
    html += '<div class="dbg-row dbg-hdr"><span>дата</span><span style="text-align:right">траты</span><span style="text-align:right">ТРТ</span><span style="text-align:right">лимит</span><span style="text-align:right">ошибка</span></div>';
    rows.forEach(function(r) {
      const errStr = r.err === null ? '—' : r.err === 0 ? '0' : r.err > 0 ? '+' + fmtNum(r.err) : '−' + fmtNum(Math.abs(r.err));
      const errColor = r.err === null || r.err === 0 ? 'var(--muted)' : r.err > 0 ? 'var(--accent)' : 'var(--danger)';
      html += '<div class="dbg-row"><span class="dbg-date">' + r.ds + '</span>'
        + '<span class="dbg-num">' + fmtNum(r.sp) + '</span>'
        + '<span class="dbg-num">' + (r.bigSum > 0 ? fmtNum(r.bigSum) : '—') + '</span>'
        + '<span class="dbg-num">' + (limitV > 0 ? fmtNum(limitV) : '—') + '</span>'
        + '<span class="dbg-err" style="color:' + errColor + '">' + errStr + '</span></div>';
    });
  }

  // блок событий таймлайна
  html += '<div style="' + MH + 'padding:12px 0 6px;border-top:1px solid var(--border2);margin-top:8px;">синие точки — история правок</div>';
  if (!events.length) {
    html += '<div style="' + MS + 'color:var(--muted);">нет событий</div>';
  } else {
    const show = events.slice(0, 60);
    show.forEach(function(ev) {
      html += '<div style="display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--border);' + MS + 'align-items:baseline;">'
        + '<span style="color:var(--accent2);flex-shrink:0;">' + ev.dayStr + '</span>'
        + '<span style="color:var(--muted);flex-shrink:0;">' + ev.time + '</span>'
        + '<span style="color:var(--muted2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + ev.what + '</span>'
        + (ev.val !== '' ? '<span style="color:var(--muted);flex-shrink:0;">' + (ev.val || '—') + '</span>' : '')
        + '</div>';
    });
    if (events.length > 60) html += '<div style="' + MS + 'color:var(--muted);padding:4px 0;">... ещё ' + (events.length - 60) + '</div>';
  }

  const list = document.getElementById('debug-list');
  list.innerHTML = html;
  document.getElementById('debug-popup').classList.add('open');
}
function closeDebug() {
  document.getElementById('debug-popup').classList.remove('open');
}

function closeHist() {
  document.getElementById('hist-popup').classList.remove('open');
}

  ];
  save();
}
