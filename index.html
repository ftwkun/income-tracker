function getFcExpenses() {
  const rows = document.getElementById('fc-expenses').querySelectorAll('div[style]');
  const freqVals = ['once','daily','weekly','monthly','yearly'];
  const result = [];
  rows.forEach(function(row) {
    const dateInp = row.querySelector('input[type=date]');
    const sumInp = row.querySelector('input[type=number]');
    const labelInp = row.querySelector('input[type=text]');
    const freqBtns = row.querySelectorAll('.fc-freq-btn');
    let freq = 'once';
    freqBtns.forEach(function(btn, i) { if (btn.classList.contains('active')) freq = freqVals[i]; });
    if (dateInp && sumInp && parseFloat(sumInp.value)) {
      result.push({ date: dateInp.value, sum: sumInp.value, label: labelInp ? labelInp.value : '', freq: freq });
    }
  });
  return result;
}

function fcExpand(rows, startDate, endDate) {
  const result = [];
  rows.forEach(function(r) {
    const s = parseFloat(r.sum); if (isNaN(s) || s === 0) return;
    const extra = r.srcId ? { srcId: r.srcId } : {};
    if (r.freq === 'once') {
      if (r.date >= startDate && r.date <= endDate) result.push(Object.assign({ date: r.date, sum: s }, extra));
      return;
    }
    const dt = new Date(r.date);
    while (true) {
      const ds = dt.toISOString().split('T')[0];
      if (ds > endDate) break;
      if (ds >= startDate) result.push(Object.assign({ date: ds, sum: s }, extra));
      if (r.freq === 'monthly') dt.setMonth(dt.getMonth() + 1);
      else if (r.freq === 'yearly') dt.setFullYear(dt.getFullYear() + 1);
      else if (r.freq === 'weekly') dt.setDate(dt.getDate() + 7);
      else dt.setDate(dt.getDate() + 1);
    }
  });
  return result;
}

function fcCalc() {
  state.fc.balDate = document.getElementById('fc-bal-date').value;
  state.fc.balVal = document.getElementById('fc-bal-val').value;
  state.fc.limit = document.getElementById('fc-limit').value;
  state.fc.expenses = getFcExpenses();
  save();

  const startDate = today();
  const allDays = daysInYear(state.year);
  const futureDays = allDays.filter(function(ds) { return ds >= startDate; });
  if (!futureDays.length) { closeForecast(); return; }

  const limit = parseFloat(state.fc.limit) || 0;
  const lastDay = futureDays[futureDays.length - 1];
  const expanded = fcExpand(state.fc.expenses, startDate, lastDay);

  // build daily spend map only for future
  const spendMap = {};
  if (limit > 0) futureDays.forEach(function(ds) { spendMap[ds] = limit; });
  expanded.forEach(function(e) { spendMap[e.date] = (spendMap[e.date] || 0) + e.sum; });

  // write only future spends
  futureDays.forEach(function(ds) {
    if (spendMap[ds]) setSpend(ds, spendMap[ds]);
  });
  logAction();
  save();
  closeForecast();
  renderMatrix();
}

// ── Settings & Pack/Unpack ─────────────────────────────────────────────
const IT_EPOCH = new Date('2020-01-01').getTime();
const MS_DAY = 86400000;

function dateToDay16(ds) {
  if (!ds) return -1;
  return Math.round((new Date(ds).getTime() - IT_EPOCH) / MS_DAY);
}
function day16ToDate(d) {
  if (d < 0) return '';
  return new Date(IT_EPOCH + d * MS_DAY).toISOString().split('T')[0];
}
function encStr(s, maxBytes) {
  const b = new TextEncoder().encode((s || '').slice(0, 20));
  return b.slice(0, maxBytes);
}

function packData() {
  const sources = state.sources || [];
  const cells = state.cells || {};
  const fc = state.fc || {};
  const fcExpenses = fc.expenses || [];
  const fcIncomes = fc.incomes || [];
  const freqVals = ['once','daily','weekly','monthly','yearly'];

  // collect non-empty cells
  const cellEntries = [];
  Object.keys(cells).forEach(function(key) {
    const cell = cells[key];
    const v = parseFloat(cell.value);
    if (isNaN(v) || v === 0) return;
    const parts = key.split('|');
    if (parts.length !== 2) return;
    const ds = parts[0], srcId = parts[1];
    const srcIdx = sources.findIndex(function(s) { return s.id === srcId; });
    if (srcIdx < 0) return;
    cellEntries.push({ ds, srcIdx, v, history: cell.history || [] });
  });

  // collect non-empty spends
  const spendEntries = Object.keys(state.spends || {}).filter(function(ds) {
    const v = parseFloat(state.spends[ds]);
    return !isNaN(v) && v !== 0;
  });

  // encode fc expense labels
  const enc = new TextEncoder();
  const expLabels = fcExpenses.map(function(e) { return enc.encode((e.label || '').slice(0, 60)); });

  // estimate size
  let size = 4 + 1 + sources.length * 15; // +1 flags byte per source
  cellEntries.forEach(function(c) { size += 8 + c.history.length * 7; });
  size += 2 + spendEntries.length * 6;
  size += 11; // fc header: balDate(2)+balVal(4)+limit(4)+expCount(1)
  fcExpenses.forEach(function(e, i) { size += 8 + expLabels[i].length; });
  size += 1 + fcIncomes.length * 8; // incomeCount(1) + srcIdx(1)+date(2)+sum(4)+freq(1) each
  size += 4; // safety

  const buf = new ArrayBuffer(size + 512);
  const dv = new DataView(buf);
  let pos = 0;

  dv.setUint8(pos++, 0x49); // 'I'
  dv.setUint8(pos++, 0x54); // 'T'
  dv.setUint8(pos++, 0x06); // version 6
  dv.setInt16(pos, state.year || new Date().getFullYear(), false); pos += 2;

  // sources (v4: +1 byte flags: bit0=noBalance)
  dv.setUint8(pos++, sources.length);
  sources.forEach(function(s) {
    const code = enc.encode((s.code || '').slice(0, 6));
    dv.setUint8(pos++, code.length);
    code.forEach(function(b) { dv.setUint8(pos++, b); });
    dv.setInt16(pos, dateToDay16(s.start), false); pos += 2;
    dv.setInt16(pos, dateToDay16(s.end), false); pos += 2;
    let h = 0;
    for (var i = 0; i < s.id.length; i++) h = (h * 31 + s.id.charCodeAt(i)) & 0xFFFFFFFF;
    dv.setInt32(pos, h, false); pos += 4;
    dv.setUint8(pos++, s.noBalance ? 1 : 0); // flags
  });

  // cells
  dv.setUint16(pos, cellEntries.length, false); pos += 2;
  cellEntries.forEach(function(c) {
    dv.setUint8(pos++, c.srcIdx);
    dv.setInt16(pos, dateToDay16(c.ds), false); pos += 2;
    dv.setInt32(pos, Math.round(c.v), false); pos += 4;
    const hist = c.history.filter(function(h) { return h.value !== '' && !isNaN(parseFloat(h.value)); });
    dv.setUint8(pos++, Math.min(hist.length, 15));
    hist.slice(-15).forEach(function(h) {
      dv.setInt32(pos, Math.round(parseFloat(h.value)), false); pos += 4;
      const mins = Math.round(new Date(h.ts).getTime() / 60000);
      dv.setUint32(pos, mins >>> 0, false); pos += 4;
    });
  });

  // spends
  dv.setUint16(pos, spendEntries.length, false); pos += 2;
  spendEntries.forEach(function(ds) {
    dv.setInt16(pos, dateToDay16(ds), false); pos += 2;
    dv.setInt32(pos, Math.round(parseFloat(state.spends[ds])), false); pos += 4;
  });

  // fc
  dv.setInt16(pos, dateToDay16(fc.balDate), false); pos += 2;
  dv.setInt32(pos, Math.round(parseFloat(fc.balVal) || 0), false); pos += 4;
  dv.setInt32(pos, Math.round(parseFloat(fc.limit) || 0), false); pos += 4;
  dv.setUint8(pos++, Math.min(fcExpenses.length, 255));
  fcExpenses.forEach(function(e, i) {
    dv.setInt16(pos, dateToDay16(e.date), false); pos += 2;
    dv.setInt32(pos, Math.round(parseFloat(e.sum) || 0), false); pos += 4;
    dv.setUint8(pos++, Math.max(0, freqVals.indexOf(e.freq || 'once')));
    const lb = expLabels[i];
    dv.setUint8(pos++, lb.length);
    lb.forEach(function(b) { dv.setUint8(pos++, b); });
  });

  // fc.incomes
  dv.setUint8(pos++, Math.min(fcIncomes.length, 255));
  fcIncomes.forEach(function(e) {
    const srcIdx = sources.findIndex(function(s) { return s.id === e.srcId; });
    dv.setUint8(pos++, srcIdx >= 0 ? srcIdx : 0);
    dv.setInt16(pos, dateToDay16(e.date), false); pos += 2;
    dv.setInt32(pos, Math.round(parseFloat(e.sum) || 0), false); pos += 4;
    dv.setUint8(pos++, Math.max(0, freqVals.indexOf(e.freq || 'monthly')));
  });

  const bytes = new Uint8Array(buf, 0, pos);
  let hex = 'IT6';
  bytes.forEach(function(b) { hex += b.toString(16).padStart(2,'0'); });
  return hex;
}

function unpackData(str) {
  if (!str.startsWith('IT2') && !str.startsWith('IT3') && !str.startsWith('IT4') && !str.startsWith('IT5') && !str.startsWith('IT6')) throw new Error('bad format');
  const hexStr = str.slice(3);
  const bytes = new Uint8Array(hexStr.length / 2);
  for (var i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(hexStr.slice(i*2, i*2+2), 16);
  }
  const dv = new DataView(bytes.buffer);
  let pos = 0;

  if (dv.getUint8(pos++) !== 0x49 || dv.getUint8(pos++) !== 0x54) throw new Error('bad magic');
  const ver = dv.getUint8(pos++);
  const year = dv.getInt16(pos, false); pos += 2;

  const dec = new TextDecoder();
  const freqVals = ['once','daily','weekly','monthly','yearly'];

  const srcCount = dv.getUint8(pos++);
  const sources = [];
  for (var i = 0; i < srcCount; i++) {
    const clen = dv.getUint8(pos++);
    const codeBytes = bytes.slice(pos, pos + clen); pos += clen;
    const code = dec.decode(codeBytes);
    const start = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const end = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const hash = dv.getInt32(pos, false); pos += 4;
    const flags = ver >= 4 ? dv.getUint8(pos++) : 0;
    sources.push({ id: 'src_' + hash, code: code, name: '', start: start, end: end, noBalance: !!(flags & 1) });
  }

  const cellCount = dv.getUint16(pos, false); pos += 2;
  const cells = {};
  for (var j = 0; j < cellCount; j++) {
    const srcIdx = dv.getUint8(pos++);
    const ds = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const value = String(dv.getInt32(pos, false)); pos += 4;
    const histCount = dv.getUint8(pos++);
    const history = [];
    for (var k = 0; k < histCount; k++) {
      const hval = String(dv.getInt32(pos, false)); pos += 4;
      let mins;
      if (ver >= 6) { mins = dv.getUint32(pos, false); pos += 4; }
      else { mins = (dv.getUint8(pos) << 16) | (dv.getUint8(pos+1) << 8) | dv.getUint8(pos+2); pos += 3; }
      const ts = new Date(mins * 60000).toISOString();
      history.push({ value: hval, ts: ts });
    }
    if (srcIdx < sources.length) {
      const key = ds + '|' + sources[srcIdx].id;
      cells[key] = { value: value, history: history };
    }
  }

  const spends = {};
  if (ver >= 3) {
    const spendCount = dv.getUint16(pos, false); pos += 2;
    for (var m = 0; m < spendCount; m++) {
      const ds = day16ToDate(dv.getInt16(pos, false)); pos += 2;
      const v = dv.getInt32(pos, false); pos += 4;
      if (ds) spends[ds] = String(v);
    }
  }

  let fc = { balDate: '', balVal: '', limit: '', expenses: [], incomes: [] };
  if (ver >= 4) {
    fc.balDate = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const balVal = dv.getInt32(pos, false); pos += 4;
    fc.balVal = balVal !== 0 ? String(balVal) : '';
    const limit = dv.getInt32(pos, false); pos += 4;
    fc.limit = limit !== 0 ? String(limit) : '';
    const expCount = dv.getUint8(pos++);
    for (var n = 0; n < expCount; n++) {
      const eDate = day16ToDate(dv.getInt16(pos, false)); pos += 2;
      const eSum = dv.getInt32(pos, false); pos += 4;
      const eFreq = freqVals[dv.getUint8(pos++)] || 'once';
      const llen = dv.getUint8(pos++);
      const label = dec.decode(bytes.slice(pos, pos + llen)); pos += llen;
      fc.expenses.push({ date: eDate, sum: eSum !== 0 ? String(eSum) : '', label: label, freq: eFreq });
    }
  }
  if (ver >= 5) {
    const incCount = dv.getUint8(pos++);
    for (var p = 0; p < incCount; p++) {
      const srcIdx = dv.getUint8(pos++);
      const iDate = day16ToDate(dv.getInt16(pos, false)); pos += 2;
      const iSum = dv.getInt32(pos, false); pos += 4;
      const iFreq = freqVals[dv.getUint8(pos++)] || 'monthly';
      const srcId = srcIdx < sources.length ? sources[srcIdx].id : '';
      if (srcId) fc.incomes.push({ srcId: srcId, date: iDate, sum: iSum !== 0 ? String(iSum) : '', freq: iFreq });
    }
  }

  return { sources: sources, cells: cells, year: year, spends: spends, fc: fc };
}

function openSettings() {
  document.getElementById('export-field').value = '';
  document.getElementById('import-field').value = '';
  // show size info
  const packed = packData();
  document.getElementById('export-field').value = packed;
  document.getElementById('export-size').textContent = packed.length + ' б';
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}

function doExport() {
  const field = document.getElementById('export-field');
  field.select();
  try { document.execCommand('copy'); } catch(e) {}
  field.style.borderColor = 'var(--accent)';
  setTimeout(function() { field.style.borderColor = ''; }, 1500);
}

function doImport() {
  const raw = document.getElementById('import-field').value;
  // strip newlines, spaces and non-printable chars
  const input = raw.replace(/[^a-fA-F0-9IT]/g, '').trim();
  const field = document.getElementById('import-field');
  try {
    const newState = unpackData(input);
    state = Object.assign({}, newState, {
      spends: newState.spends || state.spends,
      fc: (newState.fc && (newState.fc.balVal || newState.fc.balDate || newState.fc.limit || newState.fc.expenses.length)) ? newState.fc : state.fc
    });
    initState();
    save();
    field.style.borderColor = 'var(--accent)';
    setTimeout(function() {
      field.style.borderColor = '';
      closeSettings();
      if (mode === 'matrix') renderMatrix();
      else renderDay();
    }, 800);
  } catch(e) {
    field.style.borderColor = 'var(--danger)';
    setTimeout(function() { field.style.borderColor = ''; }, 1500);
  }
}

function doClearHistory() {
  if (!confirm('Очистить историю изменений? Значения в ячейках останутся.')) return;

// ── History ────────────────────────────────────────────────────────────
function showHist(date, srcId) {
  const cell = getCell(date, srcId);
  const src = state.sources.find(function(s) { return s.id === srcId; });
  const code = src ? src.code : srcId;
  document.getElementById('hist-title').textContent = code + ' · ' + fmtDate(date);
  const list = document.getElementById('hist-list');
  const all = cell.history.slice().reverse();
  if (all.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 0;">нет истории</div>';
  } else {
    list.innerHTML = all.map(function(h) {
      return '<div class="hist-row"><span class="hist-ts">' + fmtTs(h.ts) + '</span><span class="hist-val">' + (h.value || '—') + '</span></div>';
    }).join('');
  }
  document.getElementById('hist-popup').classList.add('open');
}

function closeHist() {
  document.getElementById('hist-popup').classList.remove('open');
}

// ── Init ───────────────────────────────────────────────────────────────
load();
// demo sources if empty
if (state.sources.length === 0) {
  state.sources = [
    { id: 'src_1', code: 'ЗП', name: 'Зарплата', start: '', end: '' },
    { id: 'src_2', code: 'АР', name: 'Аренда', start: '', end: '' },
    { id: 'src_3', code: 'ДВ', name: 'Дивиденды', start: '', end: '' },
  ];
  save();
}
renderMatrix();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/income-tracker/sw.js');
}
</script>
</body>
