<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Income Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Income">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

:root {
  --bg: #0e0e0f;
  --surface: #161617;
  --surface2: #1e1e20;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8e6;
  --muted: #555;
  --muted2: #777;
  --accent: #4ade80;
  --accent2: #22d3ee;
  --danger: #f87171;
  --warn: #fbbf24;
  --past: rgba(255,255,255,0.03);
  --today-bg: rgba(74,222,128,0.06);
  --today-border: rgba(74,222,128,0.3);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 13px; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  z-index: 100;
}
#header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--muted2); letter-spacing: 0.05em; flex: 1; }
.mode-btn {
  font-family: var(--mono); font-size: 11px; padding: 4px 10px;
  background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--muted2); cursor: pointer; transition: all 0.15s;
}
.mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
#btn-sources {
  font-family: var(--mono); font-size: 11px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-sources:hover { border-color: var(--border2); color: var(--muted2); }

/* ── Main content ── */
#content { flex: 1; overflow: hidden; position: relative; display: flex; }

/* ── Timeline slider ── */
#timeline {
  width: 14px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border2);
  position: relative; overflow: hidden;
  cursor: ns-resize;
  user-select: none;
}
#timeline-track {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
}
.tl-marker {
  position: absolute; left: 2px; right: 2px; height: 2px;
  background: var(--accent2); border-radius: 1px; opacity: 0.25;
  cursor: pointer; transition: opacity 0.1s;
}
@keyframes tl-cell-flash {
  0%   { box-shadow: inset 0 0 0 200px rgba(251,191,36,0.45); }
  100% { box-shadow: inset 0 0 0 200px transparent; }
}
.tl-flash { animation: tl-cell-flash 0.55s ease-out forwards; }
.tl-marker:hover { opacity: 1; }
#tl-cursor {
  position: absolute; left: 0; right: 0; height: 2px;
  background: var(--accent); pointer-events: none;
  box-shadow: 0 0 4px var(--accent);
}
#tl-label {
  position: fixed; left: 20px;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: 4px; padding: 2px 6px;
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  pointer-events: none; z-index: 500; display: none;
  white-space: nowrap;
}
#tl-now-btn {
  position: absolute; bottom: 4px; left: 1px; right: 1px;
  background: none; border: 1px solid var(--accent);
  border-radius: 3px; color: var(--accent);
  font-size: 8px; cursor: pointer; padding: 2px 0;
  line-height: 1; z-index: 2;
}

/* ══════════════════════════════════════════
   MATRIX MODE
══════════════════════════════════════════ */
#matrix-wrap {
  flex: 1; height: 100%;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

#matrix {
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 11px;
  width: max-content;
  min-width: 100%;
}

#matrix th, #matrix td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

/* sticky date col */
#matrix th:first-child,
#matrix td:first-child {
  position: sticky; left: 0; z-index: 2;
  background: var(--bg);
  border-right: 1px solid var(--border2);
}

/* sticky header row */
#matrix thead th {
  position: sticky; top: 0; z-index: 3;
  background: var(--surface);
  padding: 6px 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  color: var(--muted2);
  text-transform: uppercase;
}
#matrix thead th:first-child { z-index: 4; }

/* date cells */
#matrix td:first-child {
  padding: 4px 8px;
  color: var(--muted2);
  font-size: 10px;
  min-width: 64px;
}

/* value cells */
.m-cell {
  padding: 0; width: 64px; min-width: 64px;
}
.m-cell input {
  width: 64px; height: 26px;
  background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 11px;
  color: var(--text); text-align: right;
  padding: 0 6px; cursor: pointer;
}
.m-cell input:focus { background: rgba(74,222,128,0.08); color: var(--accent); }
.m-cell input.has-value { color: var(--warn); }
.m-cell input.zero { color: var(--muted); }

/* row states */
tr.past td:first-child { color: var(--muted); }
tr.past .m-cell input { color: var(--muted2); }
tr.past .m-cell input.has-value { color: rgba(251,191,36,0.5); }
tr.today td { background: var(--today-bg) !important; }
tr.today td:first-child { color: var(--accent) !important; font-weight: 600; }
tr.month-sep td { border-top: 1px solid var(--border2); }

/* row total */
.m-total { color: var(--warn) !important; font-weight: 600; }

/* edit marker dot in date cell */
.edit-dot {
  display: inline-block; width: 4px; height: 4px;
  border-radius: 50%; background: var(--accent2);
  margin-left: 3px; vertical-align: middle; opacity: 0.7;
  flex-shrink: 0;
}

/* history view mode */
#matrix.history-mode .m-cell input { color: var(--warn) !important; }
#matrix.history-mode tr.today td { background: none !important; }

/* error tooltip */
#err-tooltip {
  position: fixed; z-index: 600;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 12px;
  font-family: var(--mono); font-size: 10px;
  pointer-events: none; display: none;
  min-width: 160px; max-width: 240px;
}
.err-tt-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
.err-tt-ts { color: var(--muted); }
.err-tt-val { font-weight: 600; }
.err-tt-delta-pos { color: var(--danger); }
.err-tt-delta-neg { color: var(--accent); }
.err-tt-delta-zero { color: var(--warn); }
.err-tt-sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* col total row */
tr.col-total td { background: var(--surface) !important; border-top: 1px solid var(--border2); }
tr.col-total td:first-child { color: var(--muted2); font-size: 10px; }
.col-total-val { color: var(--warn); font-weight: 600; }
tr.month-total-row td { background: rgba(34,211,238,0.04) !important; border-top: 1px solid rgba(34,211,238,0.15); border-bottom: 1px solid rgba(34,211,238,0.15); }
tr.weekend td { background: rgba(251,191,36,0.04) !important; }
tr.weekend td:first-child { color: #999; }
tr.past.weekend td { background: rgba(251,191,36,0.025) !important; }
tr.past.weekend td:first-child { color: #666; }
tr.today.weekend td { background: rgba(74,222,128,0.08) !important; }

/* move arrows overlay */
#move-overlay {
  position: fixed; z-index: 500;
  display: none; flex-direction: column; align-items: center; gap: 0;
  pointer-events: all;
}
#move-overlay.visible { display: flex; }
.move-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--accent2); font-family: var(--mono); font-size: 14px;
  width: 32px; height: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.move-btn:active { background: rgba(34,211,238,0.15); }
.move-btn.up { border-radius: 4px 4px 0 0; border-bottom: none; }
.move-btn.dn { border-radius: 0 0 4px 4px; }
.move-cell-highlight { outline: 2px solid var(--accent2) !important; outline-offset: -1px; }

/* ══════════════════════════════════════════
   DAY MODE
══════════════════════════════════════════ */
#day-wrap {
  width: 100%; height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0;
}

.day-card {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.day-card.past { background: var(--past); }
.day-card.today { background: var(--today-bg); border-left: 2px solid var(--accent); }
.day-card.future { background: var(--bg); }

.day-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px 8px;
  cursor: pointer;
  user-select: none;
}
.day-date {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  min-width: 80px; color: var(--muted2);
}
.day-card.today .day-date { color: var(--accent); }
.day-card.past .day-date { color: var(--muted); }
.day-total {
  font-family: var(--mono); font-size: 12px;
  color: var(--warn); font-weight: 600; margin-left: auto;
}
.day-total.zero { color: var(--muted); font-weight: 400; }
.day-spend-hdr {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: rgba(248,113,113,0.85);
}
.day-chevron { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
.day-card.expanded .day-chevron { transform: rotate(90deg); }

.day-entries {
  display: none;
  padding: 0 14px 10px;
  gap: 4px;
}
.day-card.expanded .day-entries { display: flex; flex-direction: column; }

.entry-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.entry-row:last-child { border-bottom: none; }
.entry-code {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--muted2); min-width: 36px;
  letter-spacing: 0.05em;
}
.entry-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 13px;
  color: var(--text); text-align: right;
  padding: 2px 0;
}
.entry-input:focus { color: var(--accent); }
.entry-input.has-value { color: var(--accent2); }
.entry-input.zero { color: var(--muted); }
.entry-hist-btn {
  font-size: 9px; color: var(--muted); background: none; border: none;
  cursor: pointer; padding: 2px 4px;
  font-family: var(--mono);
}
.entry-input.spend { color: rgba(248,113,113,0.7); }
.entry-input.spend:focus { color: var(--danger); }
.entry-input.spend.has-value { color: rgba(248,113,113,0.9); }
.entry-hist-btn:hover { color: var(--muted2); }

/* ── Source inactive overlay ── */
.entry-row.inactive .entry-code { color: var(--muted); opacity: 0.4; }
.entry-row.inactive .entry-input { opacity: 0.3; }

/* ── Matrix day detail row ── */
tr.matrix-day-detail > td { padding: 8px 14px 12px; background: rgba(30,41,59,0.6); border-bottom: 1px solid var(--border2); }
.mdd-wrap { display: flex; gap: 12px; align-items: flex-start; }
.mdd-col { display: flex; flex-direction: column; gap: 0; }
.mdd-col-inc { flex: 0 0 auto; min-width: 0; }
.mdd-col-inc .entry-input { width: 62px; flex: 0 0 62px; text-align: right; }
.mdd-col-spend { flex: 1; min-width: 100px; }
.mdd-col-title { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.mdd-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.mdd-row:last-child { border-bottom: none; }
#matrix.sources-collapsed tr[data-date-row] td:first-child { cursor: pointer; user-select: none; }
#matrix.sources-collapsed tr[data-date-row] td:first-child:hover { color: var(--accent2); }

/* ══════════════════════════════════════════
   SOURCES PANEL
══════════════════════════════════════════ */
#sources-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: none; align-items: flex-end;
}
#sources-panel.open { display: flex; }
#sources-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 16px 16px 32px;
  max-height: 80vh; overflow-y: auto;
}
#sources-inner h2 {
  font-family: var(--mono); font-size: 12px; color: var(--muted2);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 14px;
}
.src-item {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.src-nobal {
  width: 100%; font-size: 10px; color: var(--muted); cursor: pointer;
  display: flex; align-items: center; gap: 5px; padding-left: 2px;
}
.src-code-input {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--accent2); padding: 4px 8px; width: 56px;
  text-align: center; text-transform: uppercase;
}
.src-name-input {
  flex: 1; background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--text); padding: 4px 8px; font-size: 12px;
}
.src-dates { display: flex; gap: 4px; }
.src-date-input {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted2); padding: 3px 5px; font-size: 10px;
  font-family: var(--mono); width: 90px;
}
.src-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
.src-del:hover { color: var(--danger); }
#btn-add-src {
  margin-top: 12px; width: 100%;
  background: none; border: 1px dashed var(--border2);
  border-radius: 6px; padding: 10px;
  color: var(--muted2); font-family: var(--mono); font-size: 11px;
  cursor: pointer; letter-spacing: 0.05em;
}
#btn-add-src:hover { border-color: var(--accent); color: var(--accent); }
#btn-close-src {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer;
}
#btn-settings {
  font-family: var(--mono); font-size: 14px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-settings:hover { border-color: var(--border2); color: var(--muted2); }
#btn-collapse-src {
  font-family: var(--mono); font-size: 14px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-collapse-src:hover { border-color: var(--border2); color: var(--muted2); }
#btn-collapse-src.active { color: var(--accent2); border-color: var(--accent2); }
#settings-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: none; align-items: flex-end;
}
#settings-panel.open { display: flex; }
#settings-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 16px 16px 32px;
  max-height: 80vh; overflow-y: auto;
  position: relative;
}
#settings-inner h2 { font-family: var(--mono); font-size: 12px; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
#btn-close-settings { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.settings-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.settings-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 10px;
  padding: 8px; resize: vertical; min-height: 80px;
}
.settings-btn {
  margin-top: 6px; width: 100%; padding: 9px;
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  color: var(--muted2); font-family: var(--mono); font-size: 11px; cursor: pointer;
  letter-spacing: 0.05em;
}
.settings-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.settings-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.settings-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
#matrix.sources-collapsed .m-cell { display: none; }
#matrix:not(.sources-collapsed) thead th.col-spend,
#matrix:not(.sources-collapsed) thead th.col-income-total,
#matrix:not(.sources-collapsed) thead th.col-evening { display: none; }
#matrix.sources-collapsed thead th:not(:first-child):not(.col-spend):not(.col-income-total):not(.col-evening):not(.col-row-total) { display: none; }
#matrix.sources-collapsed tr.month-total-row td:not(:first-child):not(.col-row-total):not(.col-spend):not(.col-income-total):not(.col-evening) { display: none; }
#matrix.sources-collapsed tr.col-total td:not(:first-child):not(.col-row-total):not(.col-spend):not(.col-income-total):not(.col-evening) { display: none; }

/* ── History popup ── */
#hist-popup {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center;
}
#hist-popup.open { display: flex; }
#hist-inner {
  background: var(--surface); border-radius: 12px;
  padding: 16px; min-width: 260px; max-width: 90vw;
}
#hist-inner h3 { font-family: var(--mono); font-size: 11px; color: var(--muted2); margin-bottom: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
.hist-row {
  display: flex; justify-content: space-between; gap: 16px;
  padding: 5px 0; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 11px;
}
.hist-row:last-child { border-bottom: none; }
.hist-ts { color: var(--muted); }
.hist-val { color: var(--accent2); font-weight: 600; }
#btn-close-hist {
  margin-top: 12px; width: 100%;
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  padding: 8px; color: var(--muted2); font-family: var(--mono); font-size: 11px;
  cursor: pointer;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

input:not([type="checkbox"]) { -webkit-appearance: none; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

/* ── Forecast panel ── */
#forecast-panel, #inc-forecast-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  display: none; align-items: flex-end;
}
#forecast-panel.open, #inc-forecast-panel.open { display: flex; }
#forecast-inner, #inc-forecast-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  max-height: 90vh; overflow-y: auto;
  position: relative;
}
#btn-close-forecast { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.fc-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.fc-section-title { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.fc-field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.fc-field label { font-family: var(--mono); font-size: 11px; color: var(--muted2); white-space: nowrap; }
.fc-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 5px 8px; min-width: 0; }
.fc-input:focus { outline: none; border-color: var(--accent2); }
.fc-entry { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.fc-entry-date { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--muted2); font-family: var(--mono); font-size: 11px; padding: 4px 6px; width: 110px; }
.fc-entry-sum { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--accent2); font-family: var(--mono); font-size: 11px; padding: 4px 6px; width: 80px; text-align: right; }
.fc-entry-label { background: none; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 4px 2px; flex: 1; min-width: 60px; }
.fc-entry-label:focus { outline: none; border-color: var(--accent2); }
.fc-freq { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
.fc-freq-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--muted); font-family: var(--mono); font-size: 9px; padding: 2px 6px; cursor: pointer; }
.fc-freq-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(34,211,238,0.08); }
.fc-del { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; padding: 0 4px; flex-shrink: 0; }
.fc-del:hover { color: var(--danger); }
.fc-add-btn { width: 100%; background: none; border: 1px dashed var(--border2); border-radius: 6px; padding: 8px; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; margin-top: 4px; }
.fc-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.fc-calc-btn { display: block; margin: 12px 16px 24px; width: calc(100% - 32px); background: var(--accent); border: none; border-radius: 8px; color: #000; font-family: var(--mono); font-size: 13px; font-weight: 700; padding: 12px; cursor: pointer; }
.fc-badge { font-family: var(--mono); font-size: 10px; color: var(--accent); background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); border-radius: 4px; padding: 2px 6px; }

/* sticky total col right */
#matrix th.col-row-total,
#matrix td.col-row-total {
  position: sticky; right: 0; z-index: 2;
  background: var(--bg);
  border-left: 1px solid var(--border2);
}
#matrix thead th.col-row-total { background: var(--surface); z-index: 4; }
#matrix tr.today td.col-row-total { background: var(--today-bg) !important; }
#matrix tr.month-total-row td.col-row-total { background: rgba(34,211,238,0.04) !important; }
#matrix tr.col-total td.col-row-total { background: var(--surface) !important; }
#matrix tr.weekend td.col-row-total { background: rgba(251,191,36,0.04) !important; }
.col-spend, .col-income-total, .col-evening { display: none; }
/* mo-sum headers always hidden */
thead th.mo-sum { display: none; }
/* collapsed mode: show day-row extra cols + hide sources */
#matrix.sources-collapsed .col-spend,
#matrix.sources-collapsed .col-income-total,
#matrix.sources-collapsed .col-evening { display: table-cell; }
td.col-spend { padding: 0; width: 64px; min-width: 64px; }
.col-spend input { width: 64px; height: 26px; background: none; border: none; outline: none; font-family: var(--mono); font-size: 11px; color: rgba(248,113,113,0.7); text-align: right; padding: 0 6px; }
.col-spend input:focus { background: rgba(248,113,113,0.08); color: var(--danger); }
.col-spend input.has-value { color: rgba(248,113,113,0.8); }
td.col-income-total, td.col-evening { padding: 0 6px; text-align: right; font-family: var(--mono); font-size: 11px; width: 64px; min-width: 64px; white-space: nowrap; }
/* ── Debug button & popup ── */
#btn-debug { background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 5px 14px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; cursor: pointer; opacity: 0.5; }
#btn-debug:hover { opacity: 1; color: var(--muted2); }
#debug-popup { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
#debug-popup.open { display: flex; }
#debug-inner { background: var(--surface); border-radius: 12px; padding: 16px; min-width: 300px; max-width: 94vw; max-height: 80vh; display: flex; flex-direction: column; gap: 0; }
#debug-inner h3 { font-family: var(--mono); font-size: 11px; color: var(--muted2); margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0; }
#debug-list { overflow-y: auto; flex: 1; }
#btn-close-debug { margin-top: 12px; width: 100%; background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 8px; color: var(--muted2); font-family: var(--mono); font-size: 11px; cursor: pointer; flex-shrink: 0; }
.dbg-row { display: grid; grid-template-columns: 80px 56px 56px 56px 1fr; gap: 4px; padding: 4px 0; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; align-items: center; }
.dbg-row:last-child { border-bottom: none; }
.dbg-hdr { color: var(--muted); font-size: 9px; letter-spacing: 0.06em; }
.dbg-date { color: var(--muted2); }
.dbg-num { text-align: right; color: var(--muted); }
.dbg-err { text-align: right; font-weight: 600; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button class="mode-btn active" id="btn-matrix" onclick="setMode('matrix')">матрица</button>
    <button class="mode-btn" id="btn-forecast" onclick="openForecast()">прогноз трат</button>
    <button class="mode-btn" id="btn-inc-forecast" onclick="openIncForecast()">прогноз доходов</button>
    <button id="btn-sources" onclick="openSources()">источники</button>
    <button id="btn-collapse-src" onclick="toggleSourcesCols()" title="свернуть источники">⊟</button>
    <button id="btn-settings" onclick="openSettings()">⚙</button>
  </div>
  <div id="content">
    <div id="timeline" style="display:none;">
      <div id="timeline-track"></div>
      <div id="tl-cursor"></div>
      <button id="tl-now-btn" onmousedown="event.preventDefault()" onclick="resetViewDate()" title="сейчас">●</button>
    </div>
    <div id="tl-label"></div>
    <div id="err-tooltip"></div>
    <div id="matrix-wrap" style="display:block;"></div>
    <div id="day-wrap" style="display:none;"></div>
  </div>
</div>

<!-- Settings panel -->
<div id="settings-panel" onclick="if(event.target===this)closeSettings()">
  <div id="settings-inner">
    <button id="btn-close-settings" onclick="closeSettings()">×</button>
    <h2>Настройки</h2>
    <div class="settings-label">Экспорт данных <span id="export-size" style="color:var(--muted);font-size:10px;"></span></div>
    <textarea class="settings-textarea" id="export-field" readonly placeholder="нажмите кнопку ниже..."></textarea>
    <button class="settings-btn" onclick="doExport()">скопировать данные</button>
    <hr class="settings-divider">
    <div class="settings-label">Импорт данных</div>
    <textarea class="settings-textarea" id="import-field" placeholder="вставьте строку данных сюда..."></textarea>
    <button class="settings-btn" onclick="doImport()">восстановить из строки</button>
    <hr class="settings-divider">
    <button class="settings-btn danger" onclick="doClear()">очистить все данные</button>
    <hr class="settings-divider">
    <button class="settings-btn" onclick="doClearHistory()">очистить историю изменений</button>
  </div>
</div>

<!-- Forecast panel -->
<div id="forecast-panel" onclick="if(event.target===this)closeForecast()">
  <div id="forecast-inner">
    <button id="btn-close-forecast" onclick="closeForecast()">×</button>
    <h2 style="padding:16px 16px 12px;">прогноз // траты</h2>

    <div class="fc-section">
      <div class="fc-section-title">стартовый баланс</div>
      <div class="fc-field">
        <label>дата</label>
        <input type="date" class="fc-input" id="fc-bal-date" style="max-width:130px;">
        <input type="number" class="fc-input" id="fc-bal-val" placeholder="сумма" style="max-width:110px;" inputmode="numeric">
      </div>
    </div>

    <div class="fc-section">
      <div class="fc-section-title">
        <span>лимит / день</span>
      </div>
      <div class="fc-field">
        <label>₽ / день</label>
        <input type="number" class="fc-input" id="fc-limit" placeholder="авто" inputmode="numeric">
      </div>
    </div>

    <div class="fc-section">
      <div class="fc-section-title">
        <span>крупные траты</span>
        <button class="fc-add-btn" style="width:auto;margin:0;padding:2px 8px;" onclick="fcAddExpense()">+ добавить</button>
      </div>
      <div id="fc-expenses"></div>
    </div>

    <button class="fc-calc-btn" onclick="fcCalc()">рассчитать →</button>
  </div>
</div>

<!-- Income forecast panel -->
<div id="inc-forecast-panel" onclick="if(event.target===this)closeIncForecast()">
  <div id="inc-forecast-inner">
    <button id="btn-close-inc-forecast" onclick="closeIncForecast()">×</button>
    <h2 style="padding:16px 16px 12px;">прогноз доходов</h2>
    <div class="fc-section">
      <div class="fc-section-title">
        <span>поступления</span>
        <button class="fc-add-btn" style="width:auto;margin:0;padding:2px 8px;" onclick="fcAddIncome()">+ добавить</button>
      </div>
      <div id="fc-incomes"></div>
    </div>
    <button class="fc-calc-btn" style="background:var(--accent2);" onclick="fcIncCalc()">рассчитать →</button>
  </div>
</div>

<!-- Sources panel -->
<div id="sources-panel" onclick="if(event.target===this)closeSources()">
  <div id="sources-inner">
    <button id="btn-close-src" onclick="closeSources()">×</button>
    <h2>Источники доходов</h2>
    <div id="src-list"></div>
    <button id="btn-add-src" onclick="addSource()">+ добавить источник</button>
  </div>
</div>

<!-- Move overlay -->
<div id="move-overlay">
  <button class="move-btn up" id="move-up" onmousedown="event.preventDefault()" onclick="moveCell(-1)">↑</button>
  <button class="move-btn dn" id="move-dn" onmousedown="event.preventDefault()" onclick="moveCell(1)">↓</button>
</div>

<!-- Debug popup -->
<div id="debug-popup" onclick="if(event.target===this)closeDebug()">
  <div id="debug-inner">
    <h3>ошибки трат</h3>
    <div id="debug-list"></div>
    <button id="btn-close-debug" onclick="closeDebug()">закрыть</button>
  </div>
</div>

<!-- History popup -->
<div id="hist-popup" onclick="if(event.target===this)closeHist()">
  <div id="hist-inner">
    <h3 id="hist-title">история</h3>
    <div id="hist-list"></div>
    <button id="btn-close-hist" onclick="closeHist()">закрыть</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
const STORE_KEY = 'income_tracker_v1';
let state = { sources: [], cells: {}, spends: {}, year: new Date().getFullYear(), fc: { balDate: '', balVal: '', limit: '', expenses: [] } };

function initState() {
  if (!state.sources) state.sources = [];
  if (!state.cells) state.cells = {};
  if (!state.spends) state.spends = {};
  if (!state.spendHistory) state.spendHistory = {};
  if (!state.year) state.year = new Date().getFullYear();
  if (!state.fc) state.fc = { balDate: '', balVal: '', limit: '', expenses: [], incomes: [] };
  if (!state.fc.incomes) state.fc.incomes = [];
  if (state.sourcesCollapsed === undefined) state.sourcesCollapsed = true;
  if (!state.actionLog) state.actionLog = [];
  if (!state.expOverrides) state.expOverrides = {};
  if (!state.collapsedMonths) {
    state.collapsedMonths = {};
    const cur = new Date().getMonth();
    for (var i = 0; i < 12; i++) { if (i !== cur) state.collapsedMonths[i] = true; }
  }
}

function load() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
  initState();
}

function save() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch(e) {
    var t = document.getElementById('save-err-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'save-err-toast';
      t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;font-family:var(--mono);font-size:11px;padding:8px 18px;border-radius:8px;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
      document.body.appendChild(t);
    }
    t.textContent = '⚠ не сохранено — хранилище переполнено';
    t.style.opacity = '1';
    clearTimeout(t._tid);
    t._tid = setTimeout(function() { t.style.opacity = '0'; }, 4000);
  }
}

function loadSound(name) {
  var b64 = _soundB64[name];
  if (!b64) return;
  var bin = atob(b64), ab = new ArrayBuffer(bin.length), u8 = new Uint8Array(ab);
  for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  getAudioCtx().decodeAudioData(ab, function(buf) { _soundBufs[name] = buf; }, function() {});
}

function playBuf(name) {
  const ctx = getAudioCtx();
  const buf = _soundBufs[name];
  if (!buf) return false;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start();
  return true;
}

function playSynth(good) {
  try {
    const ctx = getAudioCtx();
    if (good) {
      [1600, 2200, 3000].forEach(function(freq, i) {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        const t = ctx.currentTime + i * 0.025;
        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.75, t + 0.55);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
        osc.start(t); osc.stop(t + 0.6);
      });
    } else {
      const osc = ctx.createOscillator(), flt = ctx.createBiquadFilter(), gain = ctx.createGain();
      osc.connect(flt); flt.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle'; flt.type = 'lowpass'; flt.frequency.value = 350;
      osc.frequency.setValueAtTime(260, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.18);
      gain.gain.setValueAtTime(0.45, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.25);
    }
  } catch(e) {}
}

// oldVal — значение ДО изменения, newVal — после
function triggerSpendSound(oldVal, newVal) {
  if (newVal === oldVal) return;
  try {
    const good = newVal < oldVal; // снизили траты — хорошо, повысили — плохо
    if (good) { if (!playBuf('good')) playSynth(true); }
    else      { if (!playBuf('bad'))  playSynth(false); }
  } catch(e) {}
}

function logAction() {
  const ds = today();
  if (!state.actionLog) state.actionLog = [];
  if (!state.actionLog.includes(ds)) state.actionLog.push(ds);
}

function calcAutoSpend(ds) {
  const limitV = parseFloat(state.fc && state.fc.limit) || 0;
  if (limitV <= 0) return 0;
  const bigSum = (buildDayExpensesMap([ds])[ds] || [])
    .reduce(function(a, e) { return a + (parseFloat(e.sum) || 0); }, 0);
  return limitV + bigSum;
}

function setSpend(ds, rawValue) {
  const v = parseFloat(rawValue) || 0;
  const newStr = v > 0 ? String(Math.round(v)) : '';
  const oldStr = state.spends[ds] != null ? String(Math.round(parseFloat(state.spends[ds]) || 0)) : '';
  if (oldStr === newStr) return;
  if (!state.spendHistory) state.spendHistory = {};
  if (!state.spendHistory[ds]) state.spendHistory[ds] = [];
  state.spendHistory[ds].push({ value: oldStr, ts: new Date().toISOString() });
  if (v > 0) state.spends[ds] = v; else delete state.spends[ds];
}

function getSpendAt(ds, viewTs) {
  const hist = (state.spendHistory || {})[ds] || [];
  const curStr = state.spends[ds] != null ? String(Math.round(parseFloat(state.spends[ds]) || 0)) : '';
  if (!hist.length) return parseFloat(curStr) || 0;
  // hist[i].value = value that existed BEFORE hist[i].ts was recorded
  let val = hist[0].value;
  for (var i = 0; i < hist.length; i++) {
    if (new Date(hist[i].ts).getTime() <= viewTs) {
      val = (i + 1 < hist.length) ? hist[i + 1].value : curStr;
    }
  }
  return parseFloat(val) || 0;
}

function cellKey(date, srcId) { return date + '|' + srcId; }

function getCell(date, srcId) {
  return state.cells[cellKey(date, srcId)] || { value: '', history: [] };
}

function setCell(date, srcId, value) {
  const key = cellKey(date, srcId);
  const now = new Date().toISOString();
  if (!state.cells[key]) state.cells[key] = { value: '', history: [], createdAt: now };
  const cell = state.cells[key];
  if (cell.value !== value) {
    cell.history.push({ value: cell.value, ts: now });
    cell.value = value;
  }
  save();
}

// ── Date helpers ───────────────────────────────────────────────────────
function localDateStr(d) {
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + mo + '-' + dd;
}

function today() { return localDateStr(new Date()); }

function daysInYear(year) {
  const days = [];
  const d = new Date(year, 0, 1);
  while (d.getFullYear() === year) {
    days.push(localDateStr(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function parseLocalDate(ds) {
  const p = ds.split('-');
  return new Date(+p[0], +p[1] - 1, +p[2]);
}

function fmtDate(ds) {
  const d = parseLocalDate(ds);
  const dd = d.getDate();
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
  const dow = ['вс','пн','вт','ср','чт','пт','сб'][d.getDay()];
  return dd + ' ' + mo + ' ' + dow;
}

function fmtTs(iso) {
  const d = new Date(iso);
  return d.getDate() + '.' + String(d.getMonth()+1).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function fmtNum(v) {
  if (!v && v !== 0) return '';
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  return Math.round(n).toLocaleString('ru');
}

function activeSources(date) {
  return state.sources.filter(function(s) {
    if (s.end && date > s.end) return false;
    if (s.start && date < s.start) return false;
    return true;
  });
}

      setCell(this.dataset.date, this.dataset.src, this.value);
