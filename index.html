<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Income Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Income">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

:root {
  --bg: #0e0e0f;
  --surface: #161617;
  --surface2: #1e1e20;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8e6;
  --muted: #555;
  --muted2: #777;
  --accent: #4ade80;
  --accent2: #22d3ee;
  --danger: #f87171;
  --warn: #fbbf24;
  --past: rgba(255,255,255,0.03);
  --today-bg: rgba(74,222,128,0.06);
  --today-border: rgba(74,222,128,0.3);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 13px; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  z-index: 100;
}
#header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--muted2); letter-spacing: 0.05em; flex: 1; }
.mode-btn {
  font-family: var(--mono); font-size: 11px; padding: 4px 10px;
  background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--muted2); cursor: pointer; transition: all 0.15s;
}
.mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
#btn-sources {
  font-family: var(--mono); font-size: 11px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-sources:hover { border-color: var(--border2); color: var(--muted2); }

/* ── Main content ── */
#content { flex: 1; overflow: hidden; position: relative; display: flex; }

/* ── Timeline slider ── */
#timeline {
  width: 14px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border2);
  position: relative; overflow: hidden;
  cursor: ns-resize;
  user-select: none;
}
#timeline-track {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
}
.tl-marker {
  position: absolute; left: 2px; right: 2px; height: 2px;
  background: var(--accent2); border-radius: 1px; opacity: 0.25;
  cursor: pointer; transition: opacity 0.1s;
}
.tl-marker:hover { opacity: 1; }
#tl-cursor {
  position: absolute; left: 0; right: 0; height: 2px;
  background: var(--accent); pointer-events: none;
  box-shadow: 0 0 4px var(--accent);
}
#tl-label {
  position: fixed; left: 20px;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: 4px; padding: 2px 6px;
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  pointer-events: none; z-index: 500; display: none;
  white-space: nowrap;
}
#tl-now-btn {
  position: absolute; bottom: 4px; left: 1px; right: 1px;
  background: none; border: 1px solid var(--accent);
  border-radius: 3px; color: var(--accent);
  font-size: 8px; cursor: pointer; padding: 2px 0;
  line-height: 1; z-index: 2;
}

/* ══════════════════════════════════════════
   MATRIX MODE
══════════════════════════════════════════ */
#matrix-wrap {
  flex: 1; height: 100%;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

#matrix {
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 11px;
  width: max-content;
  min-width: 100%;
}

#matrix th, #matrix td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

/* sticky date col */
#matrix th:first-child,
#matrix td:first-child {
  position: sticky; left: 0; z-index: 2;
  background: var(--bg);
  border-right: 1px solid var(--border2);
}

/* sticky header row */
#matrix thead th {
  position: sticky; top: 0; z-index: 3;
  background: var(--surface);
  padding: 6px 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  color: var(--muted2);
  text-transform: uppercase;
}
#matrix thead th:first-child { z-index: 4; }

/* date cells */
#matrix td:first-child {
  padding: 4px 8px;
  color: var(--muted2);
  font-size: 10px;
  min-width: 64px;
}

/* value cells */
.m-cell {
  padding: 0; width: 64px; min-width: 64px;
}
.m-cell input {
  width: 64px; height: 26px;
  background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 11px;
  color: var(--text); text-align: right;
  padding: 0 6px; cursor: pointer;
}
.m-cell input:focus { background: rgba(74,222,128,0.08); color: var(--accent); }
.m-cell input.has-value { color: var(--accent2); }
.m-cell input.zero { color: var(--muted); }

/* row states */
tr.past td:first-child { color: var(--muted); }
tr.past .m-cell input { color: var(--muted2); }
tr.past .m-cell input.has-value { color: rgba(34,211,238,0.5); }
tr.today td { background: var(--today-bg) !important; }
tr.today td:first-child { color: var(--accent) !important; font-weight: 600; }
tr.month-sep td { border-top: 1px solid var(--border2); }

/* row total */
.m-total { color: var(--warn) !important; font-weight: 600; }

/* edit marker dot in date cell */
.edit-dot {
  display: inline-block; width: 4px; height: 4px;
  border-radius: 50%; background: var(--accent2);
  margin-left: 3px; vertical-align: middle; opacity: 0.7;
  flex-shrink: 0;
}

/* history view mode */
#matrix.history-mode .m-cell input { color: var(--warn) !important; }
#matrix.history-mode tr.today td { background: none !important; }

/* error tooltip */
#err-tooltip {
  position: fixed; z-index: 600;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 12px;
  font-family: var(--mono); font-size: 10px;
  pointer-events: none; display: none;
  min-width: 160px; max-width: 240px;
}
.err-tt-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
.err-tt-ts { color: var(--muted); }
.err-tt-val { font-weight: 600; }
.err-tt-delta-pos { color: var(--danger); }
.err-tt-delta-neg { color: var(--accent); }
.err-tt-delta-zero { color: var(--warn); }
.err-tt-sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* col total row */
tr.col-total td { background: var(--surface) !important; border-top: 1px solid var(--border2); }
tr.col-total td:first-child { color: var(--muted2); font-size: 10px; }
.col-total-val { color: var(--warn); font-weight: 600; }
tr.month-total-row td { background: rgba(34,211,238,0.04) !important; border-top: 1px solid rgba(34,211,238,0.15); border-bottom: 1px solid rgba(34,211,238,0.15); }
tr.weekend td { background: rgba(251,191,36,0.04) !important; }
tr.weekend td:first-child { color: #999; }
tr.past.weekend td { background: rgba(251,191,36,0.025) !important; }
tr.past.weekend td:first-child { color: #666; }
tr.today.weekend td { background: rgba(74,222,128,0.08) !important; }

/* move arrows overlay */
#move-overlay {
  position: fixed; z-index: 500;
  display: none; flex-direction: column; align-items: center; gap: 0;
  pointer-events: all;
}
#move-overlay.visible { display: flex; }
.move-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--accent2); font-family: var(--mono); font-size: 14px;
  width: 32px; height: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.move-btn:active { background: rgba(34,211,238,0.15); }
.move-btn.up { border-radius: 4px 4px 0 0; border-bottom: none; }
.move-btn.dn { border-radius: 0 0 4px 4px; }
.move-cell-highlight { outline: 2px solid var(--accent2) !important; outline-offset: -1px; }

/* ══════════════════════════════════════════
   DAY MODE
══════════════════════════════════════════ */
#day-wrap {
  width: 100%; height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0;
}

.day-card {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.day-card.past { background: var(--past); }
.day-card.today { background: var(--today-bg); border-left: 2px solid var(--accent); }
.day-card.future { background: var(--bg); }

.day-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px 8px;
  cursor: pointer;
  user-select: none;
}
.day-date {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  min-width: 80px; color: var(--muted2);
}
.day-card.today .day-date { color: var(--accent); }
.day-card.past .day-date { color: var(--muted); }
.day-total {
  font-family: var(--mono); font-size: 12px;
  color: var(--warn); font-weight: 600; margin-left: auto;
}
.day-total.zero { color: var(--muted); font-weight: 400; }
.day-chevron { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
.day-card.expanded .day-chevron { transform: rotate(90deg); }

.day-entries {
  display: none;
  padding: 0 14px 10px;
  gap: 4px;
}
.day-card.expanded .day-entries { display: flex; flex-direction: column; }

.entry-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.entry-row:last-child { border-bottom: none; }
.entry-code {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--muted2); min-width: 36px;
  letter-spacing: 0.05em;
}
.entry-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 13px;
  color: var(--text); text-align: right;
  padding: 2px 0;
}
.entry-input:focus { color: var(--accent); }
.entry-input.has-value { color: var(--accent2); }
.entry-input.zero { color: var(--muted); }
.entry-hist-btn {
  font-size: 9px; color: var(--muted); background: none; border: none;
  cursor: pointer; padding: 2px 4px;
  font-family: var(--mono);
}
.entry-hist-btn:hover { color: var(--muted2); }

/* ── Source inactive overlay ── */
.entry-row.inactive .entry-code { color: var(--muted); opacity: 0.4; }
.entry-row.inactive .entry-input { opacity: 0.3; }

/* ══════════════════════════════════════════
   SOURCES PANEL
══════════════════════════════════════════ */
#sources-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: none; align-items: flex-end;
}
#sources-panel.open { display: flex; }
#sources-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 16px 16px 32px;
  max-height: 80vh; overflow-y: auto;
}
#sources-inner h2 {
  font-family: var(--mono); font-size: 12px; color: var(--muted2);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 14px;
}
.src-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.src-code-input {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--accent2); padding: 4px 8px; width: 56px;
  text-align: center; text-transform: uppercase;
}
.src-name-input {
  flex: 1; background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--text); padding: 4px 8px; font-size: 12px;
}
.src-dates { display: flex; gap: 4px; }
.src-date-input {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted2); padding: 3px 5px; font-size: 10px;
  font-family: var(--mono); width: 90px;
}
.src-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
.src-del:hover { color: var(--danger); }
#btn-add-src {
  margin-top: 12px; width: 100%;
  background: none; border: 1px dashed var(--border2);
  border-radius: 6px; padding: 10px;
  color: var(--muted2); font-family: var(--mono); font-size: 11px;
  cursor: pointer; letter-spacing: 0.05em;
}
#btn-add-src:hover { border-color: var(--accent); color: var(--accent); }
#btn-close-src {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer;
}
#btn-settings {
  font-family: var(--mono); font-size: 14px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-settings:hover { border-color: var(--border2); color: var(--muted2); }
#settings-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: none; align-items: flex-end;
}
#settings-panel.open { display: flex; }
#settings-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 16px 16px 32px;
  max-height: 80vh; overflow-y: auto;
  position: relative;
}
#settings-inner h2 { font-family: var(--mono); font-size: 12px; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
#btn-close-settings { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.settings-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.settings-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 10px;
  padding: 8px; resize: vertical; min-height: 80px;
}
.settings-btn {
  margin-top: 6px; width: 100%; padding: 9px;
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  color: var(--muted2); font-family: var(--mono); font-size: 11px; cursor: pointer;
  letter-spacing: 0.05em;
}
.settings-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.settings-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.settings-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ── History popup ── */
#hist-popup {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center;
}
#hist-popup.open { display: flex; }
#hist-inner {
  background: var(--surface); border-radius: 12px;
  padding: 16px; min-width: 260px; max-width: 90vw;
}
#hist-inner h3 { font-family: var(--mono); font-size: 11px; color: var(--muted2); margin-bottom: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
.hist-row {
  display: flex; justify-content: space-between; gap: 16px;
  padding: 5px 0; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 11px;
}
.hist-row:last-child { border-bottom: none; }
.hist-ts { color: var(--muted); }
.hist-val { color: var(--accent2); font-weight: 600; }
#btn-close-hist {
  margin-top: 12px; width: 100%;
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  padding: 8px; color: var(--muted2); font-family: var(--mono); font-size: 11px;
  cursor: pointer;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

input { -webkit-appearance: none; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>income //</h1>
    <button class="mode-btn active" id="btn-matrix" onclick="setMode('matrix')">матрица</button>
    <button class="mode-btn" id="btn-day" onclick="setMode('day')">день</button>
    <button id="btn-sources" onclick="openSources()">источники</button>
    <button id="btn-settings" onclick="openSettings()">⚙</button>
  </div>
  <div id="content">
    <div id="timeline" style="display:none;">
      <div id="timeline-track"></div>
      <div id="tl-cursor"></div>
      <button id="tl-now-btn" onmousedown="event.preventDefault()" onclick="resetViewDate()" title="сейчас">●</button>
    </div>
    <div id="tl-label"></div>
    <div id="err-tooltip"></div>
    <div id="matrix-wrap" style="display:block;"></div>
    <div id="day-wrap" style="display:none;"></div>
  </div>
</div>

<!-- Settings panel -->
<div id="settings-panel" onclick="if(event.target===this)closeSettings()">
  <div id="settings-inner">
    <button id="btn-close-settings" onclick="closeSettings()">×</button>
    <h2>Настройки</h2>
    <div class="settings-label">Экспорт данных <span id="export-size" style="color:var(--muted);font-size:10px;"></span></div>
    <textarea class="settings-textarea" id="export-field" readonly placeholder="нажмите кнопку ниже..."></textarea>
    <button class="settings-btn" onclick="doExport()">скопировать данные</button>
    <hr class="settings-divider">
    <div class="settings-label">Импорт данных</div>
    <textarea class="settings-textarea" id="import-field" placeholder="вставьте строку данных сюда..."></textarea>
    <button class="settings-btn" onclick="doImport()">восстановить из строки</button>
    <hr class="settings-divider">
    <button class="settings-btn danger" onclick="doClear()">очистить все данные</button>
    <hr class="settings-divider">
    <button class="settings-btn" onclick="doClearHistory()">очистить историю изменений</button>
  </div>
</div>

<!-- Sources panel -->
<div id="sources-panel" onclick="if(event.target===this)closeSources()">
  <div id="sources-inner">
    <button id="btn-close-src" onclick="closeSources()">×</button>
    <h2>Источники доходов</h2>
    <div id="src-list"></div>
    <button id="btn-add-src" onclick="addSource()">+ добавить источник</button>
  </div>
</div>

<!-- Move overlay -->
<div id="move-overlay">
  <button class="move-btn up" id="move-up" onmousedown="event.preventDefault()" onclick="moveCell(-1)">↑</button>
  <button class="move-btn dn" id="move-dn" onmousedown="event.preventDefault()" onclick="moveCell(1)">↓</button>
</div>

<!-- History popup -->
<div id="hist-popup" onclick="if(event.target===this)closeHist()">
  <div id="hist-inner">
    <h3 id="hist-title">история</h3>
    <div id="hist-list"></div>
    <button id="btn-close-hist" onclick="closeHist()">закрыть</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
const STORE_KEY = 'income_tracker_v1';
let state = { sources: [], cells: {}, year: new Date().getFullYear() };

function load() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
  if (!state.sources) state.sources = [];
  if (!state.cells) state.cells = {};
  if (!state.year) state.year = new Date().getFullYear();
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function cellKey(date, srcId) { return date + '|' + srcId; }

function getCell(date, srcId) {
  return state.cells[cellKey(date, srcId)] || { value: '', history: [] };
}

function setCell(date, srcId, value) {
  const key = cellKey(date, srcId);
  if (!state.cells[key]) state.cells[key] = { value: '', history: [] };
  const cell = state.cells[key];
  const now = new Date().toISOString();
  if (cell.value !== value) {
    cell.history.push({ value: cell.value, ts: now });
    cell.value = value;
  }
  save();
}

// ── Date helpers ───────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }

function daysInYear(year) {
  const days = [];
  const d = new Date(year, 0, 1);
  while (d.getFullYear() === year) {
    days.push(d.toISOString().split('T')[0]);
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function fmtDate(ds) {
  const d = new Date(ds);
  const dd = d.getDate();
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
  const dow = ['вс','пн','вт','ср','чт','пт','сб'][d.getDay()];
  return dd + ' ' + mo + ' ' + dow;
}

function fmtTs(iso) {
  const d = new Date(iso);
  return d.getDate() + '.' + String(d.getMonth()+1).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function fmtNum(v) {
  if (!v && v !== 0) return '';
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  return Math.round(n).toLocaleString('ru');
}

function activeSources(date) {
  return state.sources.filter(function(s) {
    if (s.end && date > s.end) return false;
    if (s.start && date < s.start) return false;
    return true;
  });
}

const RU_HOLIDAYS_2026 = new Set([
  '2026-01-01','2026-01-02','2026-01-03','2026-01-04','2026-01-05',
  '2026-01-06','2026-01-07','2026-01-08','2026-01-09','2026-01-10','2026-01-11',
  '2026-02-21','2026-02-22','2026-02-23',
  '2026-03-07','2026-03-08','2026-03-09',
  '2026-04-30','2026-05-01','2026-05-02','2026-05-03',
  '2026-05-09','2026-05-10','2026-05-11',
  '2026-06-12','2026-06-13','2026-06-14',
  '2026-11-04',
  '2026-12-31'
]);

function isNonWorkday(ds) {
  const dow = new Date(ds).getDay();
  return dow === 0 || dow === 6 || RU_HOLIDAYS_2026.has(ds);
}

// ── Mode ───────────────────────────────────────────────────────────────
let mode = 'matrix';

function setMode(m) {
  mode = m;
  document.getElementById('btn-matrix').classList.toggle('active', m === 'matrix');
  document.getElementById('btn-day').classList.toggle('active', m === 'day');
  document.getElementById('matrix-wrap').style.display = m === 'matrix' ? 'block' : 'none';
  document.getElementById('day-wrap').style.display = m === 'day' ? 'block' : 'none';
  if (m === 'matrix') renderMatrix();
  else renderDay();
}

// ── Matrix ─────────────────────────────────────────────────────────────
let collapsedMonths = {};
// init: collapse all months except current
(function() {
  const currentMonth = new Date().getMonth();
  for (var i = 0; i < 12; i++) {
    if (i !== currentMonth) collapsedMonths[i] = true;
  }
})();

function toggleMonth(mo) {
  collapsedMonths[mo] = !collapsedMonths[mo];
  const rows = document.querySelectorAll('tr[data-month="' + mo + '"]');
  rows.forEach(function(r) {
    r.style.display = collapsedMonths[mo] ? 'none' : '';
  });
  const hdr = document.querySelector('tr.month-total-row[data-mo="' + mo + '"]');
  if (hdr) {
    const arrow = hdr.querySelector('.mo-arrow');
    if (arrow) arrow.textContent = collapsedMonths[mo] ? '▶' : '▼';
  }
}

function renderMatrix() {
  const wrap = document.getElementById('matrix-wrap');
  const days = daysInYear(state.year);
  const sources = state.sources;
  const td0 = today();
  const MONTHS_RU = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];

  let html = '<table id="matrix"><thead><tr>';
  html += '<th>дата</th>';
  sources.forEach(function(s) { html += '<th>' + s.code + '</th>'; });
  html += '<th style="color:var(--warn)">итог</th>';
  html += '</tr></thead><tbody>';

  // pre-calc month buckets
  const monthTotals = {};
  days.forEach(function(ds) {
    const mo = new Date(ds).getMonth();
    if (!monthTotals[mo]) { monthTotals[mo] = { row: 0 }; sources.forEach(function(s){ monthTotals[mo][s.id] = 0; }); }
    sources.forEach(function(s) {
      const v = parseFloat(getCell(ds, s.id).value);
      if (!isNaN(v) && v > 0) { monthTotals[mo][s.id] += v; monthTotals[mo].row += v; }
    });
  });

  function monthTotalRow(mo, placement) {
    const mt = monthTotals[mo] || { row: 0 };
    const collapsed = collapsedMonths[mo];
    const arrow = placement === 'before' ? (collapsed ? '▶' : '▼') : '';
    let r = '<tr class="month-total-row" data-mo="' + mo + '" onclick="toggleMonth(' + mo + ')" style="cursor:pointer;">';
    r += '<td style="padding:4px 8px;color:var(--accent2);font-size:10px;font-weight:600;letter-spacing:0.05em;user-select:none;">' +
      '<span class="mo-arrow" style="margin-right:4px;font-size:9px;">' + (placement === 'before' ? (collapsed ? '▶' : '▼') : '') + '</span>' +
      MONTHS_RU[mo].slice(0,3).toUpperCase() + '</td>';
    sources.forEach(function(s) {
      const v = mt[s.id] || 0;
      r += '<td style="padding:0 6px;text-align:right;font-family:var(--mono);font-size:10px;color:' + (v > 0 ? 'var(--accent2)' : 'var(--muted)') + ';font-weight:600;">' + (v > 0 ? fmtNum(v) : '') + '</td>';
    });
    r += '<td style="padding:0 8px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--warn);font-weight:700;">' + (mt.row > 0 ? fmtNum(mt.row) : '') + '</td>';
    r += '</tr>';
    return r;
  }

  let prevMonth = -1;
  days.forEach(function(ds) {
    const d = new Date(ds);
    const mo = d.getMonth();
    const dow = d.getDay();
    const isWeekend = isNonWorkday(ds);
    const isPast = ds < td0;
    const isToday = ds === td0;

    // month total row at START of new month
    if (mo !== prevMonth) {
      html += monthTotalRow(mo, 'before');
    }
    prevMonth = mo;

    const collapsed = collapsedMonths[mo];
    let cls = isPast ? 'past' : isToday ? 'today' : 'future';
    if (isWeekend) cls += ' weekend';

    html += '<tr class="' + cls + '" data-month="' + mo + '" data-date-row="' + ds + '"' + (collapsed ? ' style="display:none"' : '') + '>';
    html += '<td>' + fmtDate(ds) + '</td>';
    let rowTotal = 0;
    sources.forEach(function(s) {
      const cell = getCell(ds, s.id);
      const v = cell.value;
      const n = parseFloat(v);
      const hasVal = !isNaN(n) && n !== 0;
      if (hasVal) rowTotal += n;
      const inputCls = hasVal ? 'has-value' : (!v ? 'zero' : '');
      html += '<td class="m-cell"><input type="number" data-date="' + ds + '" data-src="' + s.id + '"' +
        ' value="' + (hasVal ? Math.round(n) : '') + '"' +
        ' class="' + inputCls + '"' +
        ' placeholder="" inputmode="numeric"></td>';
    });
    const totalCls = rowTotal > 0 ? 'm-total' : 'zero';
    html += '<td style="padding:0 8px;text-align:right;" class="' + totalCls + '">' + (rowTotal > 0 ? fmtNum(rowTotal) : '') + '</td>';
    html += '</tr>';
  });

  // year totals
  html += '<tr class="col-total"><td style="color:var(--accent2);font-size:10px;letter-spacing:0.05em;">ГОД</td>';
  let grandTotal = 0;
  sources.forEach(function(s) {
    let total = 0;
    days.forEach(function(ds) { const v = parseFloat(getCell(ds, s.id).value); if (!isNaN(v)) total += v; });
    grandTotal += total;
    html += '<td class="m-cell" style="padding:0 6px;text-align:right;">' +
      '<span style="color:var(--warn);font-family:var(--mono);font-size:11px;font-weight:600;">' +
      (total > 0 ? fmtNum(total) : '—') + '</span></td>';
  });
  html += '<td style="padding:0 8px;text-align:right;color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:700;">' + fmtNum(grandTotal) + '</td>';
  html += '</tr></tbody></table>';
  wrap.innerHTML = html;

  setTimeout(function() {
    const rows = wrap.querySelectorAll('tr.today');
    if (rows.length) rows[0].scrollIntoView({ block: 'center' });
  }, 50);

  wrap.querySelectorAll('input[data-date]').forEach(function(inp) {
    inp.addEventListener('change', function() {
      setCell(this.dataset.date, this.dataset.src, this.value);
      const row = this.closest('tr');
      let rowTotal = 0;
      row.querySelectorAll('input[data-date]').forEach(function(i) {
        const v = parseFloat(i.value); if (!isNaN(v)) rowTotal += v;
      });
      const totalCell = row.lastElementChild;
      totalCell.textContent = rowTotal > 0 ? fmtNum(rowTotal) : '';
      totalCell.className = rowTotal > 0 ? 'm-total' : 'zero';
      const n = parseFloat(this.value);
      this.className = (!isNaN(n) && n !== 0) ? 'has-value' : 'zero';

      // recalc month total row
      const mo = new Date(this.dataset.date).getMonth();
      const daysInMo = daysInYear(state.year).filter(function(ds) { return new Date(ds).getMonth() === mo; });
      const moTotals = {};
      sources.forEach(function(s) { moTotals[s.id] = 0; });
      moTotals.row = 0;
      daysInMo.forEach(function(ds) {
        sources.forEach(function(s) {
          const inp2 = document.querySelector('input[data-date="' + ds + '"][data-src="' + s.id + '"]');
          const v = parseFloat(inp2 ? inp2.value : getCell(ds, s.id).value);
          if (!isNaN(v) && v !== 0) { moTotals[s.id] += v; moTotals.row += v; }
        });
      });
      const hdr = document.querySelector('tr.month-total-row[data-mo="' + mo + '"]');
      if (hdr) {
        const cells = hdr.querySelectorAll('td');
        sources.forEach(function(s, i) {
          const v = moTotals[s.id] || 0;
          cells[i + 1].textContent = v !== 0 ? fmtNum(v) : '';
          cells[i + 1].style.color = v !== 0 ? 'var(--accent2)' : 'var(--muted)';
        });
        cells[cells.length - 1].textContent = moTotals.row !== 0 ? fmtNum(moTotals.row) : '';
      }
    });
    inp.addEventListener('focus', function() {
      this.select();
      showMoveOverlay(this, this.dataset.date, this.dataset.src);
    });
  });

  // error tooltips on past cells — mouse hover + tap
  wrap.querySelectorAll('tr.past .m-cell input').forEach(function(inp) {
    const cell = state.cells[inp.dataset.date + '|' + inp.dataset.src];
    if (!cell || !cell.history || cell.history.length === 0) return;
    inp.addEventListener('mouseenter', function(e) { showErrTooltip(e, this.dataset.date, this.dataset.src); });
    inp.addEventListener('mousemove', posErrTooltip);
    inp.addEventListener('mouseleave', hideErrTooltip);
    inp.addEventListener('touchend', function(e) {
      const tt = document.getElementById('err-tooltip');
      if (tt.style.display === 'block') {
        hideErrTooltip();
      } else {
        const touch = e.changedTouches[0];
        showErrTooltip({ clientX: touch.clientX, clientY: touch.clientY }, this.dataset.date, this.dataset.src);
        e.preventDefault();
      }
    });
  });

  // tap outside tooltip to close on mobile
  document.addEventListener('touchstart', function(e) {
    const tt = document.getElementById('err-tooltip');
    if (tt.style.display === 'block' && !tt.contains(e.target)) {
      hideErrTooltip();
    }
  });

  // add edit markers to date cells
  renderMarkers(days);
  // show timeline
  renderTimeline(days);
}

// ── Edit markers ────────────────────────────────────────────────────────
function renderMarkers(days) {
  // find dates that have any edits
  const editDates = new Set();
  Object.keys(state.cells).forEach(function(key) {
    const cell = state.cells[key];
    if (cell.history && cell.history.length > 0) {
      const ds = key.split('|')[0];
      // mark the date of each history entry
      cell.history.forEach(function(h) {
        editDates.add(new Date(h.ts).toISOString().split('T')[0]);
      });
    }
  });

  // add dots to date cells
  days.forEach(function(ds) {
    if (!editDates.has(ds)) return;
    const row = document.querySelector('tr[data-date-row="' + ds + '"]');
    if (!row) return;
    const dateCell = row.firstElementChild;
    if (dateCell && !dateCell.querySelector('.edit-dot')) {
      const dot = document.createElement('span');
      dot.className = 'edit-dot';
      dateCell.appendChild(dot);
    }
  });
}

// ── Timeline slider ─────────────────────────────────────────────────────
let tlDragging = false;
let viewDate = null; // null = live view

function renderTimeline(days) {
  const tl = document.getElementById('timeline');
  const track = document.getElementById('timeline-track');
  tl.style.display = 'block';
  track.innerHTML = '';

  // collect all edit timestamps from history only
  const editTimes = [];
  Object.keys(state.cells).forEach(function(key) {
    const cell = state.cells[key];
    if (cell.history) {
      cell.history.forEach(function(h) {
        if (!h.ts) return;
        const t = new Date(h.ts).getTime();
        if (!isNaN(t) && t > 0) editTimes.push(t);
      });
    }
  });

  if (editTimes.length === 0) return;

  const minTs = Math.min.apply(null, editTimes);
  const maxTs = Math.max.apply(null, editTimes);
  const range = maxTs - minTs || 1;

  // unique timestamps → markers
  const uniqueTs = [...new Set(editTimes)].sort(function(a,b){return a-b;});
  uniqueTs.forEach(function(ts) {
    const pct = (ts - minTs) / range * 100;
    const marker = document.createElement('div');
    marker.className = 'tl-marker';
    marker.style.top = pct + '%';
    marker.title = new Date(ts).toLocaleDateString('ru');
    marker.dataset.ts = ts;
    marker.addEventListener('click', function(e) {
      e.stopPropagation();
      setViewDate(new Date(parseInt(this.dataset.ts)).toISOString());
    });
    track.appendChild(marker);
  });

  // drag on timeline
  tl.addEventListener('mousedown', tlMouseDown);
  tl.addEventListener('touchstart', tlTouchStart, { passive: true });
}

function tlGetPct(clientY) {
  const tl = document.getElementById('timeline');
  const rect = tl.getBoundingClientRect();
  return Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
}

function tlMouseDown(e) {
  tlDragging = true;
  tlMove(e.clientY);
  document.addEventListener('mousemove', tlMouseMove);
  document.addEventListener('mouseup', tlMouseUp);
}
function tlMouseMove(e) { if (tlDragging) tlMove(e.clientY); }
function tlMouseUp() {
  tlDragging = false;
  document.removeEventListener('mousemove', tlMouseMove);
  document.removeEventListener('mouseup', tlMouseUp);
}
function tlTouchStart(e) {
  tlMove(e.touches[0].clientY);
  document.addEventListener('touchmove', tlTouchMove, { passive: true });
  document.addEventListener('touchend', tlTouchEnd);
}
function tlTouchMove(e) { tlMove(e.touches[0].clientY); }
function tlTouchEnd() {
  document.removeEventListener('touchmove', tlTouchMove);
  document.removeEventListener('touchend', tlTouchEnd);
}

function tlMove(clientY) {
  const pct = tlGetPct(clientY);
  const cursor = document.getElementById('tl-cursor');
  cursor.style.top = (pct * 100) + '%';

  // find timestamp at this position
  const minTs = getMinTs();
  const maxTs = Date.now();
  const ts = minTs + pct * (maxTs - minTs);
  const dt = new Date(ts);
  const label = document.getElementById('tl-label');
  label.style.display = 'block';
  label.style.top = (clientY - 10) + 'px';
  label.textContent = dt.toLocaleDateString('ru') + ' ' + dt.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });

  setViewDate(dt.toISOString(), true);
}

function getMinTs() {
  const times = [];
  Object.keys(state.cells).forEach(function(key) {
    const cell = state.cells[key];
    if (cell.history) cell.history.forEach(function(h) {
      if (!h.ts) return;
      const t = new Date(h.ts).getTime();
      if (!isNaN(t) && t > 0) times.push(t);
    });
  });
  return times.length ? Math.min.apply(null, times) : Date.now() - 86400000;
}

function setViewDate(isoStr, preview) {
  viewDate = isoStr;
  const ts = new Date(isoStr).getTime();

  // update all inputs to show values as of that timestamp
  document.querySelectorAll('input[data-date][data-src]').forEach(function(inp) {
    const key = inp.dataset.date + '|' + inp.dataset.src;
    const cell = state.cells[key];
    if (!cell) { inp.value = ''; inp.className = 'zero'; return; }

    // find value at that timestamp: walk history in order
    let val = '';
    const hist = cell.history || [];
    for (var i = 0; i < hist.length; i++) {
      if (new Date(hist[i].ts).getTime() <= ts) val = hist[i].value;
    }
    // if all history is after ts, val stays ''
    // if current value was set before ts, use it
    if (new Date(cell.history && cell.history.length ? cell.history[cell.history.length-1].ts : 0).getTime() <= ts) {
      val = cell.value;
    }

    const n = parseFloat(val);
    inp.value = (!isNaN(n) && n !== 0) ? Math.round(n) : '';
    inp.className = (!isNaN(n) && n !== 0) ? 'has-value' : 'zero';
  });

  document.getElementById('matrix').classList.add('history-mode');
  if (!preview) {
    document.getElementById('tl-label').style.display = 'none';
  }
  recalcAllTotals();
}

function recalcAllTotals() {
  const sources = state.sources;
  const days = daysInYear(state.year);

  // recalc each visible month total row
  const months = [...new Set(days.map(function(ds) { return new Date(ds).getMonth(); }))];
  months.forEach(function(mo) {
    const daysInMo = days.filter(function(ds) { return new Date(ds).getMonth() === mo; });
    const moTotals = {};
    sources.forEach(function(s) { moTotals[s.id] = 0; });
    moTotals.row = 0;
    daysInMo.forEach(function(ds) {
      sources.forEach(function(s) {
        const inp = document.querySelector('input[data-date="' + ds + '"][data-src="' + s.id + '"]');
        const v = parseFloat(inp ? inp.value : '');
        if (!isNaN(v) && v !== 0) { moTotals[s.id] += v; moTotals.row += v; }
      });
    });
    const hdr = document.querySelector('tr.month-total-row[data-mo="' + mo + '"]');
    if (!hdr) return;
    const cells = hdr.querySelectorAll('td');
    sources.forEach(function(s, i) {
      const v = moTotals[s.id] || 0;
      cells[i + 1].textContent = v !== 0 ? fmtNum(v) : '';
      cells[i + 1].style.color = v !== 0 ? 'var(--accent2)' : 'var(--muted)';
    });
    cells[cells.length - 1].textContent = moTotals.row !== 0 ? fmtNum(moTotals.row) : '';
  });

  // recalc row totals
  days.forEach(function(ds) {
    const row = document.querySelector('tr[data-date-row="' + ds + '"]');
    if (!row) return;
    let total = 0;
    row.querySelectorAll('input[data-date]').forEach(function(inp) {
      const v = parseFloat(inp.value);
      if (!isNaN(v)) total += v;
    });
    const last = row.lastElementChild;
    last.textContent = total !== 0 ? fmtNum(total) : '';
    last.className = total !== 0 ? 'm-total' : 'zero';
  });
}

function resetViewDate() {
  viewDate = null;
  document.getElementById('tl-label').style.display = 'none';
  document.getElementById('matrix').classList.remove('history-mode');
  document.querySelectorAll('input[data-date][data-src]').forEach(function(inp) {
    const key = inp.dataset.date + '|' + inp.dataset.src;
    const cell = state.cells[key];
    const v = cell ? parseFloat(cell.value) : NaN;
    inp.value = (!isNaN(v) && v !== 0) ? Math.round(v) : '';
    inp.className = (!isNaN(v) && v !== 0) ? 'has-value' : 'zero';
  });
  recalcAllTotals();
}

// double-click timeline to reset to live
document.getElementById('timeline').addEventListener('dblclick', resetViewDate);

// ── Error tooltips on past cells ─────────────────────────────────────────
function showErrTooltip(e, date, srcId) {
  const cell = state.cells[date + '|' + srcId];
  if (!cell || !cell.history || cell.history.length === 0) return;

  const tt = document.getElementById('err-tooltip');
  const currentVal = parseFloat(cell.value);
  const firstVal = parseFloat(cell.history[0].value !== '' ? cell.history[0].value : (cell.history[1] ? cell.history[1].value : cell.value));

  let html = '';
  // history list
  const allVersions = cell.history.concat([{ value: cell.value, ts: new Date().toISOString(), current: true }]);
  allVersions.forEach(function(h, i) {
    const v = parseFloat(h.value);
    const vStr = (!isNaN(v) && v !== 0) ? fmtNum(v) : '—';
    const ts = h.current ? 'сейчас' : fmtTs(h.ts);
    html += '<div class="err-tt-row"><span class="err-tt-ts">' + ts + '</span><span class="err-tt-val">' + vStr + '</span></div>';
  });

  // delta: current (fact) vs first (forecast)
  if (!isNaN(currentVal) && !isNaN(firstVal) && firstVal !== 0) {
    const delta = currentVal - firstVal;
    const cls = delta > 0 ? 'err-tt-delta-neg' : delta < 0 ? 'err-tt-delta-pos' : 'err-tt-delta-zero';
    const sign = delta > 0 ? '+' : '';
    html += '<hr class="err-tt-sep">';
    html += '<div class="err-tt-row"><span class="err-tt-ts">Δ прогноз→факт</span><span class="' + cls + '">' + sign + fmtNum(delta) + '</span></div>';
  }

  tt.innerHTML = html;
  tt.style.display = 'block';
  posErrTooltip(e);
}

function posErrTooltip(e) {
  const tt = document.getElementById('err-tooltip');
  if (window.innerWidth < 480) {
    // mobile: center horizontally, position near tap
    tt.style.left = Math.max(8, (window.innerWidth - tt.offsetWidth) / 2) + 'px';
    let y = e.clientY + 16;
    if (y + tt.offsetHeight > window.innerHeight - 8) y = e.clientY - tt.offsetHeight - 8;
    tt.style.top = Math.max(8, y) + 'px';
  } else {
    let x = e.clientX + 12, y = e.clientY + 12;
    if (x + tt.offsetWidth > window.innerWidth - 8) x = e.clientX - tt.offsetWidth - 8;
    if (y + tt.offsetHeight > window.innerHeight - 8) y = e.clientY - tt.offsetHeight - 8;
    tt.style.left = x + 'px';
    tt.style.top = y + 'px';
  }
}

function hideErrTooltip() {
  document.getElementById('err-tooltip').style.display = 'none';
}

// ── Move overlay ───────────────────────────────────────────────────────
let moveState = null; // { date, srcId, value, inputEl }

function showMoveOverlay(inp, date, srcId) {
  // hide previous highlight
  if (moveState && moveState.inputEl && moveState.inputEl !== inp) {
    moveState.inputEl.classList.remove('move-cell-highlight');
  }

  const v = parseFloat(inp.value);
  moveState = { date: date, srcId: srcId, value: isNaN(v) ? 0 : v, inputEl: inp };
  if (!isNaN(v) && v !== 0) inp.classList.add('move-cell-highlight');

  const overlay = document.getElementById('move-overlay');
  const rect = inp.getBoundingClientRect();
  const upBtn = document.getElementById('move-up');
  const dnBtn = document.getElementById('move-dn');
  // up arrow above cell, down arrow below cell
  upBtn.style.position = 'fixed';
  upBtn.style.left = (rect.left + rect.width / 2 - 16) + 'px';
  upBtn.style.top = (rect.top - 26) + 'px';
  dnBtn.style.position = 'fixed';
  dnBtn.style.left = (rect.left + rect.width / 2 - 16) + 'px';
  dnBtn.style.top = (rect.bottom) + 'px';
  overlay.classList.add('visible');
}

function hideMoveOverlay() {
  if (moveState && moveState.inputEl) {
    moveState.inputEl.classList.remove('move-cell-highlight');
  }
  moveState = null;
  document.getElementById('move-overlay').classList.remove('visible');
}

function moveCell(direction) {
  if (!moveState) return;
  const currentValue = parseFloat(moveState.inputEl ? moveState.inputEl.value : 0);
  if (isNaN(currentValue) || currentValue === 0) return;
  const days = daysInYear(state.year);
  const idx = days.indexOf(moveState.date);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= days.length) return;

  const newDate = days[newIdx];
  const { srcId, date } = moveState;

  // clear old cell (save as empty, keeping history)
  setCell(date, srcId, '');
  // set new cell
  setCell(newDate, srcId, String(currentValue));

  // update DOM — find old input and clear
  const oldInp = document.querySelector('input[data-date="' + date + '"][data-src="' + srcId + '"]');
  if (oldInp) {
    oldInp.value = '';
    oldInp.className = 'zero';
    // update old row total
    updateRowTotal(oldInp.closest('tr'));
  }

  // find new input and set
  const newInp = document.querySelector('input[data-date="' + newDate + '"][data-src="' + srcId + '"]');
  if (newInp) {
    newInp.value = Math.round(currentValue);
    newInp.className = 'has-value';
    updateRowTotal(newInp.closest('tr'));
    // reposition overlay
    moveState.date = newDate;
    moveState.inputEl = newInp;
    newInp.classList.add('move-cell-highlight');
    requestAnimationFrame(function() {
      const rect = newInp.getBoundingClientRect();
      document.getElementById('move-up').style.top = (rect.top - 26) + 'px';
      document.getElementById('move-up').style.left = (rect.left + rect.width / 2 - 16) + 'px';
      document.getElementById('move-dn').style.top = (rect.bottom) + 'px';
      document.getElementById('move-dn').style.left = (rect.left + rect.width / 2 - 16) + 'px';
      newInp.scrollIntoView({ block: 'nearest' });
    });
  }
}

function updateRowTotal(row) {
  if (!row) return;
  let total = 0;
  row.querySelectorAll('input[data-date]').forEach(function(i) {
    const v = parseFloat(i.value); if (!isNaN(v)) total += v;
  });
  const last = row.lastElementChild;
  last.textContent = total > 0 ? fmtNum(total) : '';
  last.className = total > 0 ? 'm-total' : 'zero';
}

// close overlay on tap outside
document.addEventListener('click', function(e) {
  if (!moveState) return;
  const overlay = document.getElementById('move-overlay');
  if (!overlay.contains(e.target) && e.target !== moveState.inputEl) {
    hideMoveOverlay();
  }
});

// ── Day mode ───────────────────────────────────────────────────────────
function renderDay() {
  const wrap = document.getElementById('day-wrap');
  const days = daysInYear(state.year);
  const td0 = today();
  let html = '';

  days.forEach(function(ds) {
    const isPast = ds < td0;
    const isToday = ds === td0;
    const cls = isPast ? 'past' : isToday ? 'today' : 'future';
    const expanded = isToday ? ' expanded' : '';

    // row total
    let total = 0;
    state.sources.forEach(function(s) {
      if (!isSourceActive(s, ds)) return;
      const v = parseFloat(getCell(ds, s.id).value);
      if (!isNaN(v)) total += v;
    });

    html += '<div class="day-card ' + cls + expanded + '" data-date="' + ds + '">';
    html += '<div class="day-header" onclick="toggleDay(this.parentElement)">';
    html += '<span class="day-date">' + fmtDate(ds) + '</span>';
    html += '<span class="day-total ' + (total === 0 ? 'zero' : '') + '">' + (total > 0 ? fmtNum(total) : '—') + '</span>';
    html += '<span class="day-chevron">▶</span>';
    html += '</div>';

    html += '<div class="day-entries">';
    state.sources.forEach(function(s) {
      const active = isSourceActive(s, ds);
      const cell = getCell(ds, s.id);
      const v = cell.value;
      const n = parseFloat(v);
      const hasVal = !isNaN(n) && n !== 0;
      const inputCls = hasVal ? 'has-value' : '';
      const rowCls = active ? '' : ' inactive';
      html += '<div class="entry-row' + rowCls + '">';
      html += '<span class="entry-code">' + s.code + '</span>';
      html += '<input class="entry-input ' + inputCls + '" type="number" inputmode="numeric"' +
        ' data-date="' + ds + '" data-src="' + s.id + '"' +
        ' value="' + (hasVal ? Math.round(n) : '') + '" placeholder="—">';
      if (cell.history && cell.history.length > 0) {
        html += '<button class="entry-hist-btn" data-date="' + ds + '" data-src="' + s.id + '">hist</button>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });

  wrap.innerHTML = html;

  // scroll to today
  setTimeout(function() {
    const el = wrap.querySelector('.day-card.today');
    if (el) el.scrollIntoView({ block: 'start' });
  }, 50);

  // events
  wrap.querySelectorAll('.entry-input').forEach(function(inp) {
    inp.addEventListener('change', function() {
      setCell(this.dataset.date, this.dataset.src, this.value);
      // update day total
      const card = this.closest('.day-card');
      const ds = card.dataset.date;
      let total = 0;
      state.sources.forEach(function(s) {
        const v = parseFloat(getCell(ds, s.id).value);
        if (!isNaN(v)) total += v;
      });
      card.querySelector('.day-total').textContent = total > 0 ? fmtNum(total) : '—';
      card.querySelector('.day-total').className = 'day-total' + (total === 0 ? ' zero' : '');
      const n = parseFloat(this.value);
      this.className = 'entry-input' + ((!isNaN(n) && n !== 0) ? ' has-value' : '');
      // add hist button if needed
      const cell = getCell(ds, this.dataset.src);
      if (cell.history.length > 0 && !this.nextElementSibling) {
        const btn = document.createElement('button');
        btn.className = 'entry-hist-btn';
        btn.dataset.date = ds;
        btn.dataset.src = this.dataset.src;
        btn.textContent = 'hist';
        btn.addEventListener('click', function() { showHist(this.dataset.date, this.dataset.src); });
        this.parentElement.appendChild(btn);
      }
    });
    inp.addEventListener('focus', function() { this.select(); });
  });

  wrap.querySelectorAll('.entry-hist-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { showHist(this.dataset.date, this.dataset.src); });
  });
}

function isSourceActive(s, date) {
  if (s.end && date > s.end) return false;
  if (s.start && date < s.start) return false;
  return true;
}

function toggleDay(card) {
  card.classList.toggle('expanded');
}

// ── Settings & Pack/Unpack ─────────────────────────────────────────────
const IT_EPOCH = new Date('2020-01-01').getTime();
const MS_DAY = 86400000;

function dateToDay16(ds) {
  if (!ds) return -1;
  return Math.round((new Date(ds).getTime() - IT_EPOCH) / MS_DAY);
}
function day16ToDate(d) {
  if (d < 0) return '';
  return new Date(IT_EPOCH + d * MS_DAY).toISOString().split('T')[0];
}
function encStr(s, maxBytes) {
  const b = new TextEncoder().encode((s || '').slice(0, 20));
  return b.slice(0, maxBytes);
}

function packData() {
  const sources = state.sources || [];
  const cells = state.cells || {};

  // collect non-empty cells
  const cellEntries = [];
  Object.keys(cells).forEach(function(key) {
    const cell = cells[key];
    const v = parseFloat(cell.value);
    if (isNaN(v) || v === 0) return;
    const parts = key.split('|');
    if (parts.length !== 2) return;
    const ds = parts[0], srcId = parts[1];
    const srcIdx = sources.findIndex(function(s) { return s.id === srcId; });
    if (srcIdx < 0) return;
    cellEntries.push({ ds, srcIdx, v, history: cell.history || [] });
  });

  // estimate size
  // header: 2 (magic+ver) + 1 (src count)
  // per source: 1 (codelen) + code bytes + 2 (start) + 2 (end) = ~12
  // per cell: 1 (srcIdx) + 2 (day) + 4 (value) + 1 (hist count) + hist*(4+3) = ~8+
  let size = 4 + 1 + sources.length * 14;
  cellEntries.forEach(function(c) { size += 8 + c.history.length * 7; });
  size += 4; // safety

  const buf = new ArrayBuffer(size + 512);
  const dv = new DataView(buf);
  let pos = 0;

  dv.setUint8(pos++, 0x49); // 'I'
  dv.setUint8(pos++, 0x54); // 'T'
  dv.setUint8(pos++, 0x02); // version 2
  dv.setInt16(pos, state.year || new Date().getFullYear(), false); pos += 2;

  // sources
  dv.setUint8(pos++, sources.length);
  sources.forEach(function(s) {
    const code = new TextEncoder().encode((s.code || '').slice(0, 6));
    dv.setUint8(pos++, code.length);
    code.forEach(function(b) { dv.setUint8(pos++, b); });
    dv.setInt16(pos, dateToDay16(s.start), false); pos += 2;
    dv.setInt16(pos, dateToDay16(s.end), false); pos += 2;
    // id as short hash (4 bytes)
    let h = 0;
    for (var i = 0; i < s.id.length; i++) h = (h * 31 + s.id.charCodeAt(i)) & 0xFFFFFFFF;
    dv.setInt32(pos, h, false); pos += 4;
  });

  // cells
  dv.setUint16(pos, cellEntries.length, false); pos += 2;
  cellEntries.forEach(function(c) {
    dv.setUint8(pos++, c.srcIdx);
    dv.setInt16(pos, dateToDay16(c.ds), false); pos += 2;
    dv.setInt32(pos, Math.round(c.v), false); pos += 4;
    const hist = c.history.filter(function(h) { return h.value !== '' && !isNaN(parseFloat(h.value)); });
    dv.setUint8(pos++, Math.min(hist.length, 15));
    hist.slice(-15).forEach(function(h) {
      dv.setInt32(pos, Math.round(parseFloat(h.value)), false); pos += 4;
      // timestamp: minutes since epoch (3 bytes = 16M minutes = 30 years)
      const mins = Math.round(new Date(h.ts).getTime() / 60000);
      dv.setUint8(pos++, (mins >> 16) & 0xFF);
      dv.setUint8(pos++, (mins >> 8) & 0xFF);
      dv.setUint8(pos++, mins & 0xFF);
    });
  });

  const bytes = new Uint8Array(buf, 0, pos);
  let hex = 'IT2';
  bytes.forEach(function(b) { hex += b.toString(16).padStart(2,'0'); });
  return hex;
}

function unpackData(str) {
  if (!str.startsWith('IT2')) throw new Error('bad format');
  const hexStr = str.slice(3);
  const bytes = new Uint8Array(hexStr.length / 2);
  for (var i = 0; i < bytes.length; i++) {
    bytes[i] = parseInt(hexStr.slice(i*2, i*2+2), 16);
  }
  const dv = new DataView(bytes.buffer);
  let pos = 0;

  if (dv.getUint8(pos++) !== 0x49 || dv.getUint8(pos++) !== 0x54) throw new Error('bad magic');
  const ver = dv.getUint8(pos++);
  const year = dv.getInt16(pos, false); pos += 2;

  const srcCount = dv.getUint8(pos++);
  const sources = [];
  for (var i = 0; i < srcCount; i++) {
    const clen = dv.getUint8(pos++);
    const codeBytes = bytes.slice(pos, pos + clen); pos += clen;
    const code = new TextDecoder().decode(codeBytes);
    const start = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const end = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const hash = dv.getInt32(pos, false); pos += 4;
    sources.push({ id: 'src_' + hash, code: code, name: '', start: start, end: end });
  }

  const cellCount = dv.getUint16(pos, false); pos += 2;
  const cells = {};
  for (var j = 0; j < cellCount; j++) {
    const srcIdx = dv.getUint8(pos++);
    const ds = day16ToDate(dv.getInt16(pos, false)); pos += 2;
    const value = String(dv.getInt32(pos, false)); pos += 4;
    const histCount = dv.getUint8(pos++);
    const history = [];
    for (var k = 0; k < histCount; k++) {
      const hval = String(dv.getInt32(pos, false)); pos += 4;
      const mins = (dv.getUint8(pos) << 16) | (dv.getUint8(pos+1) << 8) | dv.getUint8(pos+2); pos += 3;
      const ts = new Date(mins * 60000).toISOString();
      history.push({ value: hval, ts: ts });
    }
    if (srcIdx < sources.length) {
      const key = ds + '|' + sources[srcIdx].id;
      cells[key] = { value: value, history: history };
    }
  }

  return { sources: sources, cells: cells, year: year };
}

function openSettings() {
  document.getElementById('export-field').value = '';
  document.getElementById('import-field').value = '';
  // show size info
  const packed = packData();
  document.getElementById('export-field').value = packed;
  document.getElementById('export-size').textContent = packed.length + ' б';
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}

function doExport() {
  const field = document.getElementById('export-field');
  field.select();
  try { document.execCommand('copy'); } catch(e) {}
  field.style.borderColor = 'var(--accent)';
  setTimeout(function() { field.style.borderColor = ''; }, 1500);
}

function doImport() {
  const raw = document.getElementById('import-field').value;
  // strip newlines, spaces and non-printable chars
  const input = raw.replace(/[^a-fA-F0-9IT]/g, '').trim();
  const field = document.getElementById('import-field');
  try {
    const newState = unpackData(input);
    state = newState;
    save();
    field.style.borderColor = 'var(--accent)';
    setTimeout(function() {
      field.style.borderColor = '';
      closeSettings();
      if (mode === 'matrix') renderMatrix();
      else renderDay();
    }, 800);
  } catch(e) {
    field.style.borderColor = 'var(--danger)';
    setTimeout(function() { field.style.borderColor = ''; }, 1500);
  }
}

function doClearHistory() {
  if (!confirm('Очистить историю изменений? Значения в ячейках останутся.')) return;
  Object.keys(state.cells).forEach(function(key) {
    if (state.cells[key].history) state.cells[key].history = [];
  });
  save();
  closeSettings();
  renderMatrix();
}

function doClear() {
  if (!confirm('Очистить все данные?')) return;
  state = { sources: [], cells: {}, year: new Date().getFullYear() };
  save();
  closeSettings();
  if (mode === 'matrix') renderMatrix();
  else renderDay();
}

// ── Sources ────────────────────────────────────────────────────────────
function openSources() {
  renderSources();
  document.getElementById('sources-panel').classList.add('open');
}

function closeSources() {
  document.getElementById('sources-panel').classList.remove('open');
  save();
  if (mode === 'matrix') renderMatrix();
  else renderDay();
}

function renderSources() {
  const list = document.getElementById('src-list');
  let html = '';
  state.sources.forEach(function(s, i) {
    html += '<div class="src-item" data-idx="' + i + '">';
    html += '<input class="src-code-input" value="' + s.code + '" maxlength="4" placeholder="КОД" data-field="code" data-idx="' + i + '">';
    html += '<input class="src-name-input" value="' + (s.name||'') + '" placeholder="название" data-field="name" data-idx="' + i + '">';
    html += '<div class="src-dates">';
    html += '<input class="src-date-input" type="date" value="' + (s.start||'') + '" placeholder="начало" data-field="start" data-idx="' + i + '">';
    html += '<input class="src-date-input" type="date" value="' + (s.end||'') + '" placeholder="конец" data-field="end" data-idx="' + i + '">';
    html += '</div>';
    html += '<button class="src-del" data-idx="' + i + '">×</button>';
    html += '</div>';
  });
  list.innerHTML = html;

  list.querySelectorAll('input[data-field]').forEach(function(inp) {
    inp.addEventListener('change', function() {
      const idx = parseInt(this.dataset.idx);
      state.sources[idx][this.dataset.field] = this.value;
    });
  });
  list.querySelectorAll('.src-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      state.sources.splice(idx, 1);
      renderSources();
    });
  });
}

function addSource() {
  state.sources.push({
    id: 'src_' + Date.now(),
    code: 'NEW',
    name: '',
    start: today(),
    end: ''
  });
  renderSources();
}

// ── History ────────────────────────────────────────────────────────────
function showHist(date, srcId) {
  const cell = getCell(date, srcId);
  const src = state.sources.find(function(s) { return s.id === srcId; });
  const code = src ? src.code : srcId;
  document.getElementById('hist-title').textContent = code + ' · ' + fmtDate(date);
  const list = document.getElementById('hist-list');
  const all = cell.history.slice().reverse();
  if (all.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 0;">нет истории</div>';
  } else {
    list.innerHTML = all.map(function(h) {
      return '<div class="hist-row"><span class="hist-ts">' + fmtTs(h.ts) + '</span><span class="hist-val">' + (h.value || '—') + '</span></div>';
    }).join('');
  }
  document.getElementById('hist-popup').classList.add('open');
}

function closeHist() {
  document.getElementById('hist-popup').classList.remove('open');
}

// ── Init ───────────────────────────────────────────────────────────────
load();
// demo sources if empty
if (state.sources.length === 0) {
  state.sources = [
    { id: 'src_1', code: 'ЗП', name: 'Зарплата', start: '', end: '' },
    { id: 'src_2', code: 'АР', name: 'Аренда', start: '', end: '' },
    { id: 'src_3', code: 'ДВ', name: 'Дивиденды', start: '', end: '' },
  ];
  save();
}
renderMatrix();
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/income-tracker/sw.js');
}
