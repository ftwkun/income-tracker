<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Income Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Income">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

:root {
  --bg: #0e0e0f;
  --surface: #161617;
  --surface2: #1e1e20;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8e6;
  --muted: #555;
  --muted2: #777;
  --accent: #4ade80;
  --accent2: #22d3ee;
  --danger: #f87171;
  --warn: #fbbf24;
  --past: rgba(255,255,255,0.03);
  --today-bg: rgba(74,222,128,0.06);
  --today-border: rgba(74,222,128,0.3);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 13px; }

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  z-index: 100;
}
#header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--muted2); letter-spacing: 0.05em; flex: 1; }
.mode-btn {
  font-family: var(--mono); font-size: 11px; padding: 4px 10px;
  background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--muted2); cursor: pointer; transition: all 0.15s;
}
.mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
#btn-sources {
  font-family: var(--mono); font-size: 11px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-sources:hover { border-color: var(--border2); color: var(--muted2); }

/* ── Main content ── */
#content { flex: 1; overflow: hidden; position: relative; display: flex; }

/* ── Timeline slider ── */
#timeline {
  width: 14px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border2);
  position: relative; overflow: hidden;
  cursor: ns-resize;
  user-select: none;
}
#timeline-track {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
}
.tl-marker {
  position: absolute; left: 2px; right: 2px; height: 2px;
  background: var(--accent2); border-radius: 1px; opacity: 0.25;
  cursor: pointer; transition: opacity 0.1s;
}
.tl-marker:hover { opacity: 1; }
#tl-cursor {
  position: absolute; left: 0; right: 0; height: 2px;
  background: var(--accent); pointer-events: none;
  box-shadow: 0 0 4px var(--accent);
}
#tl-label {
  position: fixed; left: 20px;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: 4px; padding: 2px 6px;
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  pointer-events: none; z-index: 500; display: none;
  white-space: nowrap;
}
#tl-now-btn {
  position: absolute; bottom: 4px; left: 1px; right: 1px;
  background: none; border: 1px solid var(--accent);
  border-radius: 3px; color: var(--accent);
  font-size: 8px; cursor: pointer; padding: 2px 0;
  line-height: 1; z-index: 2;
}

/* ══════════════════════════════════════════
   MATRIX MODE
══════════════════════════════════════════ */
#matrix-wrap {
  flex: 1; height: 100%;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

#matrix {
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 11px;
  width: max-content;
  min-width: 100%;
}

#matrix th, #matrix td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

/* sticky date col */
#matrix th:first-child,
#matrix td:first-child {
  position: sticky; left: 0; z-index: 2;
  background: var(--bg);
  border-right: 1px solid var(--border2);
}

/* sticky header row */
#matrix thead th {
  position: sticky; top: 0; z-index: 3;
  background: var(--surface);
  padding: 6px 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  color: var(--muted2);
  text-transform: uppercase;
}
#matrix thead th:first-child { z-index: 4; }

/* date cells */
#matrix td:first-child {
  padding: 4px 8px;
  color: var(--muted2);
  font-size: 10px;
  min-width: 64px;
}

/* value cells */
.m-cell {
  padding: 0; width: 64px; min-width: 64px;
}
.m-cell input {
  width: 64px; height: 26px;
  background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 11px;
  color: var(--text); text-align: right;
  padding: 0 6px; cursor: pointer;
}
.m-cell input:focus { background: rgba(74,222,128,0.08); color: var(--accent); }
.m-cell input.has-value { color: var(--warn); }
.m-cell input.zero { color: var(--muted); }

/* row states */
tr.past td:first-child { color: var(--muted); }
tr.past .m-cell input { color: var(--muted2); }
tr.past .m-cell input.has-value { color: rgba(251,191,36,0.5); }
tr.today td { background: var(--today-bg) !important; }
tr.today td:first-child { color: var(--accent) !important; font-weight: 600; }
tr.month-sep td { border-top: 1px solid var(--border2); }

/* row total */
.m-total { color: var(--warn) !important; font-weight: 600; }

/* edit marker dot in date cell */
.edit-dot {
  display: inline-block; width: 4px; height: 4px;
  border-radius: 50%; background: var(--accent2);
  margin-left: 3px; vertical-align: middle; opacity: 0.7;
  flex-shrink: 0;
}

/* history view mode */
#matrix.history-mode .m-cell input { color: var(--warn) !important; }
#matrix.history-mode tr.today td { background: none !important; }

/* error tooltip */
#err-tooltip {
  position: fixed; z-index: 600;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 12px;
  font-family: var(--mono); font-size: 10px;
  pointer-events: none; display: none;
  min-width: 160px; max-width: 240px;
}
.err-tt-row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
.err-tt-ts { color: var(--muted); }
.err-tt-val { font-weight: 600; }
.err-tt-delta-pos { color: var(--danger); }
.err-tt-delta-neg { color: var(--accent); }
.err-tt-delta-zero { color: var(--warn); }
.err-tt-sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* col total row */
tr.col-total td { background: var(--surface) !important; border-top: 1px solid var(--border2); }
tr.col-total td:first-child { color: var(--muted2); font-size: 10px; }
.col-total-val { color: var(--warn); font-weight: 600; }
tr.month-total-row td { background: rgba(34,211,238,0.04) !important; border-top: 1px solid rgba(34,211,238,0.15); border-bottom: 1px solid rgba(34,211,238,0.15); }
tr.weekend td { background: rgba(251,191,36,0.04) !important; }
tr.weekend td:first-child { color: #999; }
tr.past.weekend td { background: rgba(251,191,36,0.025) !important; }
tr.past.weekend td:first-child { color: #666; }
tr.today.weekend td { background: rgba(74,222,128,0.08) !important; }

/* move arrows overlay */
#move-overlay {
  position: fixed; z-index: 500;
  display: none; flex-direction: column; align-items: center; gap: 0;
  pointer-events: all;
}
#move-overlay.visible { display: flex; }
.move-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--accent2); font-family: var(--mono); font-size: 14px;
  width: 32px; height: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.move-btn:active { background: rgba(34,211,238,0.15); }
.move-btn.up { border-radius: 4px 4px 0 0; border-bottom: none; }
.move-btn.dn { border-radius: 0 0 4px 4px; }
.move-cell-highlight { outline: 2px solid var(--accent2) !important; outline-offset: -1px; }

/* ══════════════════════════════════════════
   DAY MODE
══════════════════════════════════════════ */
#day-wrap {
  width: 100%; height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0;
}

.day-card {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.day-card.past { background: var(--past); }
.day-card.today { background: var(--today-bg); border-left: 2px solid var(--accent); }
.day-card.future { background: var(--bg); }

.day-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px 8px;
  cursor: pointer;
  user-select: none;
}
.day-date {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  min-width: 80px; color: var(--muted2);
}
.day-card.today .day-date { color: var(--accent); }
.day-card.past .day-date { color: var(--muted); }
.day-total {
  font-family: var(--mono); font-size: 12px;
  color: var(--warn); font-weight: 600; margin-left: auto;
}
.day-total.zero { color: var(--muted); font-weight: 400; }
.day-spend-hdr {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: rgba(248,113,113,0.85);
}
.day-chevron { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
.day-card.expanded .day-chevron { transform: rotate(90deg); }

.day-entries {
  display: none;
  padding: 0 14px 10px;
  gap: 4px;
}
.day-card.expanded .day-entries { display: flex; flex-direction: column; }

.entry-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.entry-row:last-child { border-bottom: none; }
.entry-code {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--muted2); min-width: 36px;
  letter-spacing: 0.05em;
}
.entry-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 13px;
  color: var(--text); text-align: right;
  padding: 2px 0;
}
.entry-input:focus { color: var(--accent); }
.entry-input.has-value { color: var(--accent2); }
.entry-input.zero { color: var(--muted); }
.entry-hist-btn {
  font-size: 9px; color: var(--muted); background: none; border: none;
  cursor: pointer; padding: 2px 4px;
  font-family: var(--mono);
}
.entry-input.spend { color: rgba(248,113,113,0.7); }
.entry-input.spend:focus { color: var(--danger); }
.entry-input.spend.has-value { color: rgba(248,113,113,0.9); }
.entry-hist-btn:hover { color: var(--muted2); }

/* ── Source inactive overlay ── */
.entry-row.inactive .entry-code { color: var(--muted); opacity: 0.4; }
.entry-row.inactive .entry-input { opacity: 0.3; }

/* ── Matrix day detail row ── */
tr.matrix-day-detail > td { padding: 8px 14px 12px; background: rgba(30,41,59,0.6); border-bottom: 1px solid var(--border2); }
.mdd-wrap { display: flex; gap: 24px; align-items: flex-start; }
.mdd-col { display: flex; flex-direction: column; gap: 0; min-width: 140px; }
.mdd-col-title { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.mdd-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.mdd-row:last-child { border-bottom: none; }
#matrix.sources-collapsed tr[data-date-row] td:first-child { cursor: pointer; user-select: none; }
#matrix.sources-collapsed tr[data-date-row] td:first-child:hover { color: var(--accent2); }

/* ══════════════════════════════════════════
   SOURCES PANEL
══════════════════════════════════════════ */
#sources-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: none; align-items: flex-end;
}
#sources-panel.open { display: flex; }
#sources-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 16px 16px 32px;
  max-height: 80vh; overflow-y: auto;
}
#sources-inner h2 {
  font-family: var(--mono); font-size: 12px; color: var(--muted2);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 14px;
}
.src-item {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.src-nobal {
  width: 100%; font-size: 10px; color: var(--muted); cursor: pointer;
  display: flex; align-items: center; gap: 5px; padding-left: 2px;
}
.src-code-input {
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--accent2); padding: 4px 8px; width: 56px;
  text-align: center; text-transform: uppercase;
}
.src-name-input {
  flex: 1; background: none; border: 1px solid var(--border2); border-radius: 4px;
  color: var(--text); padding: 4px 8px; font-size: 12px;
}
.src-dates { display: flex; gap: 4px; }
.src-date-input {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted2); padding: 3px 5px; font-size: 10px;
  font-family: var(--mono); width: 90px;
}
.src-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
.src-del:hover { color: var(--danger); }
#btn-add-src {
  margin-top: 12px; width: 100%;
  background: none; border: 1px dashed var(--border2);
  border-radius: 6px; padding: 10px;
  color: var(--muted2); font-family: var(--mono); font-size: 11px;
  cursor: pointer; letter-spacing: 0.05em;
}
#btn-add-src:hover { border-color: var(--accent); color: var(--accent); }
#btn-close-src {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer;
}
#btn-settings {
  font-family: var(--mono); font-size: 14px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-settings:hover { border-color: var(--border2); color: var(--muted2); }
#btn-collapse-src {
  font-family: var(--mono); font-size: 14px; padding: 4px 8px;
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); cursor: pointer;
}
#btn-collapse-src:hover { border-color: var(--border2); color: var(--muted2); }
#btn-collapse-src.active { color: var(--accent2); border-color: var(--accent2); }
#settings-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: none; align-items: flex-end;
}
#settings-panel.open { display: flex; }
#settings-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 16px 16px 32px;
  max-height: 80vh; overflow-y: auto;
  position: relative;
}
#settings-inner h2 { font-family: var(--mono); font-size: 12px; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
#btn-close-settings { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.settings-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.settings-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 10px;
  padding: 8px; resize: vertical; min-height: 80px;
}
.settings-btn {
  margin-top: 6px; width: 100%; padding: 9px;
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  color: var(--muted2); font-family: var(--mono); font-size: 11px; cursor: pointer;
  letter-spacing: 0.05em;
}
.settings-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.settings-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.settings-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
#matrix.sources-collapsed .m-cell { display: none; }
#matrix:not(.sources-collapsed) thead th.col-spend,
#matrix:not(.sources-collapsed) thead th.col-income-total,
#matrix:not(.sources-collapsed) thead th.col-morning,
#matrix:not(.sources-collapsed) thead th.col-evening { display: none; }
#matrix.sources-collapsed thead th:not(:first-child):not(.col-spend):not(.col-income-total):not(.col-morning):not(.col-evening):not(.col-row-total) { display: none; }
#matrix.sources-collapsed tr.month-total-row td:not(:first-child):not(.col-row-total):not(.col-spend):not(.col-income-total):not(.col-morning):not(.col-evening) { display: none; }
#matrix.sources-collapsed tr.col-total td:not(:first-child):not(.col-row-total):not(.col-spend):not(.col-income-total):not(.col-morning):not(.col-evening) { display: none; }

/* ── History popup ── */
#hist-popup {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center;
}
#hist-popup.open { display: flex; }
#hist-inner {
  background: var(--surface); border-radius: 12px;
  padding: 16px; min-width: 260px; max-width: 90vw;
}
#hist-inner h3 { font-family: var(--mono); font-size: 11px; color: var(--muted2); margin-bottom: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
.hist-row {
  display: flex; justify-content: space-between; gap: 16px;
  padding: 5px 0; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 11px;
}
.hist-row:last-child { border-bottom: none; }
.hist-ts { color: var(--muted); }
.hist-val { color: var(--accent2); font-weight: 600; }
#btn-close-hist {
  margin-top: 12px; width: 100%;
  background: none; border: 1px solid var(--border2); border-radius: 6px;
  padding: 8px; color: var(--muted2); font-family: var(--mono); font-size: 11px;
  cursor: pointer;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

input:not([type="checkbox"]) { -webkit-appearance: none; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

/* ── Forecast panel ── */
#forecast-panel, #inc-forecast-panel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75);
  display: none; align-items: flex-end;
}
#forecast-panel.open, #inc-forecast-panel.open { display: flex; }
#forecast-inner, #inc-forecast-inner {
  width: 100%; background: var(--surface);
  border-radius: 16px 16px 0 0;
  max-height: 90vh; overflow-y: auto;
  position: relative;
}
#btn-close-forecast { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.fc-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.fc-section-title { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.fc-field { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.fc-field label { font-family: var(--mono); font-size: 11px; color: var(--muted2); white-space: nowrap; }
.fc-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 5px 8px; min-width: 0; }
.fc-input:focus { outline: none; border-color: var(--accent2); }
.fc-entry { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.fc-entry-date { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--muted2); font-family: var(--mono); font-size: 11px; padding: 4px 6px; width: 110px; }
.fc-entry-sum { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--accent2); font-family: var(--mono); font-size: 11px; padding: 4px 6px; width: 80px; text-align: right; }
.fc-entry-label { background: none; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 4px 2px; flex: 1; min-width: 60px; }
.fc-entry-label:focus { outline: none; border-color: var(--accent2); }
.fc-freq { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
.fc-freq-btn { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--muted); font-family: var(--mono); font-size: 9px; padding: 2px 6px; cursor: pointer; }
.fc-freq-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(34,211,238,0.08); }

.fc-del:hover { color: var(--danger); }
.fc-add-btn { width: 100%; background: none; border: 1px dashed var(--border2); border-radius: 6px; padding: 8px; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; margin-top: 4px; }
.fc-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.fc-calc-btn { display: block; margin: 12px 16px 24px; width: calc(100% - 32px); background: var(--accent); border: none; border-radius: 8px; color: #000; font-family: var(--mono); font-size: 13px; font-weight: 700; padding: 12px; cursor: pointer; }
.fc-badge { font-family: var(--mono); font-size: 10px; color: var(--accent); background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); border-radius: 4px; padding: 2px 6px; }

/* sticky total col right */
#matrix th.col-row-total,
#matrix td.col-row-total {
  position: sticky; right: 0; z-index: 2;
  background: var(--bg);
  border-left: 1px solid var(--border2);
}
#matrix thead th.col-row-total { background: var(--surface); z-index: 4; }
#matrix tr.today td.col-row-total { background: var(--today-bg) !important; }
#matrix tr.month-total-row td.col-row-total { background: rgba(34,211,238,0.04) !important; }
#matrix tr.col-total td.col-row-total { background: var(--surface) !important; }
#matrix tr.weekend td.col-row-total { background: rgba(251,191,36,0.04) !important; }
.col-spend, .col-income-total, .col-morning, .col-evening { display: none; }
/* mo-sum headers always hidden */
thead th.mo-sum { display: none; }
/* collapsed mode: show day-row extra cols + hide sources */
#matrix.sources-collapsed .col-spend,
#matrix.sources-collapsed .col-income-total,
#matrix.sources-collapsed .col-morning,
#matrix.sources-collapsed .col-evening { display: table-cell; }
td.col-spend { padding: 0; width: 64px; min-width: 64px; }
.col-spend input { width: 64px; height: 26px; background: none; border: none; outline: none; font-family: var(--mono); font-size: 11px; color: rgba(248,113,113,0.7); text-align: right; padding: 0 6px; }
.col-spend input:focus { background: rgba(248,113,113,0.08); color: var(--danger); }
.col-spend input.has-value { color: rgba(248,113,113,0.8); }
td.col-income-total, td.col-morning, td.col-evening { padding: 0 6px; text-align: right; font-family: var(--mono); font-size: 11px; width: 64px; min-width: 64px; white-space: nowrap; }
</style>
</head>

<script>
// ── State ──────────────────────────────────────────────────────────────
const STORE_KEY = 'income_tracker_v1';
let state = { sources: [], cells: {}, spends: {}, year: new Date().getFullYear(), fc: { balDate: '', balVal: '', limit: '', expenses: [] } };

function initState() {
  if (!state.sources) state.sources = [];
  if (!state.cells) state.cells = {};
  if (!state.spends) state.spends = {};
  if (!state.spendHistory) state.spendHistory = {};
  if (!state.year) state.year = new Date().getFullYear();
  if (!state.fc) state.fc = { balDate: '', balVal: '', limit: '', expenses: [], incomes: [] };
  if (!state.fc.incomes) state.fc.incomes = [];
  if (state.sourcesCollapsed === undefined) state.sourcesCollapsed = true;
  if (!state.actionLog) state.actionLog = [];
  if (!state.collapsedMonths) {
    state.collapsedMonths = {};
    const cur = new Date().getMonth();
    for (var i = 0; i < 12; i++) { if (i !== cur) state.collapsedMonths[i] = true; }
  }
}

function load() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
  initState();
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

function logAction() {
  const ds = today();
  if (!state.actionLog) state.actionLog = [];
  if (!state.actionLog.includes(ds)) state.actionLog.push(ds);
}

function setSpend(ds, rawValue) {
  const v = parseFloat(rawValue) || 0;
  const newStr = v > 0 ? String(Math.round(v)) : '';
  const oldStr = state.spends[ds] != null ? String(Math.round(parseFloat(state.spends[ds]) || 0)) : '';
  if (oldStr === newStr) return;
  if (!state.spendHistory) state.spendHistory = {};
  if (!state.spendHistory[ds]) state.spendHistory[ds] = [];
  state.spendHistory[ds].push({ value: oldStr, ts: new Date().toISOString() });
  if (v > 0) state.spends[ds] = v; else delete state.spends[ds];
}

function getSpendAt(ds, viewTs) {
  const hist = (state.spendHistory || {})[ds] || [];
  const curStr = state.spends[ds] != null ? String(Math.round(parseFloat(state.spends[ds]) || 0)) : '';
  if (!hist.length) return parseFloat(curStr) || 0;
  // hist[i].value = value that existed BEFORE hist[i].ts was recorded
  let val = hist[0].value;
  for (var i = 0; i < hist.length; i++) {
    if (new Date(hist[i].ts).getTime() <= viewTs) {
      val = (i + 1 < hist.length) ? hist[i + 1].value : curStr;
    }
  }
  return parseFloat(val) || 0;
}

function cellKey(date, srcId) { return date + '|' + srcId; }

function getCell(date, srcId) {
  return state.cells[cellKey(date, srcId)] || { value: '', history: [] };
}

function setCell(date, srcId, value) {
  const key = cellKey(date, srcId);
  if (!state.cells[key]) state.cells[key] = { value: '', history: [] };
  const cell = state.cells[key];
  const now = new Date().toISOString();
  if (cell.value !== value) {
    cell.history.push({ value: cell.value, ts: now });
    cell.value = value;
  }
  save();
}

// ── Date helpers ───────────────────────────────────────────────────────
function localDateStr(d) {
  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + mo + '-' + dd;
}

function today() { return localDateStr(new Date()); }

function daysInYear(year) {
  const days = [];
  const d = new Date(year, 0, 1);
  while (d.getFullYear() === year) {
    days.push(localDateStr(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function parseLocalDate(ds) {
  const p = ds.split('-');
  return new Date(+p[0], +p[1] - 1, +p[2]);
}

function fmtDate(ds) {
  const d = parseLocalDate(ds);
  const dd = d.getDate();
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
  const dow = ['вс','пн','вт','ср','чт','пт','сб'][d.getDay()];
  return dd + ' ' + mo + ' ' + dow;
}

function fmtTs(iso) {
  const d = new Date(iso);
  return d.getDate() + '.' + String(d.getMonth()+1).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function fmtNum(v) {
  if (!v && v !== 0) return '';
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  return Math.round(n).toLocaleString('ru');
}

function activeSources(date) {
  return state.sources.filter(function(s) {
    if (s.end && date > s.end) return false;
    if (s.start && date < s.start) return false;
    return true;
  });
}

const RU_HOLIDAYS_2026 = new Set([
  '2026-01-01','2026-01-02','2026-01-03','2026-01-04','2026-01-05',
  '2026-01-06','2026-01-07','2026-01-08','2026-01-09','2026-01-10','2026-01-11',
  '2026-02-21','2026-02-22','2026-02-23',
  '2026-03-07','2026-03-08','2026-03-09',
  '2026-04-30','2026-05-01','2026-05-02','2026-05-03',
  '2026-05-09','2026-05-10','2026-05-11',
  '2026-06-12','2026-06-13','2026-06-14',
  '2026-11-04',
  '2026-12-31'
]);

function isNonWorkday(ds) {
  const dow = new Date(ds).getDay();
  return dow === 0 || dow === 6 || RU_HOLIDAYS_2026.has(ds);
}

// ── Mode ───────────────────────────────────────────────────────────────
let mode = 'matrix';

function setMode(m) {
  mode = m;
  document.getElementById('btn-matrix').classList.toggle('active', m === 'matrix');
  document.getElementById('matrix-wrap').style.display = m === 'matrix' ? 'block' : 'none';
  document.getElementById('day-wrap').style.display = m === 'day' ? 'block' : 'none';
  if (m === 'matrix') renderMatrix();
  else renderDay();
}

// ── Matrix ─────────────────────────────────────────────────────────────
(function() {
})();

function toggleDayDetail(e, td) {
  if (!document.getElementById('matrix').classList.contains('sources-collapsed')) return;
  const tr = td.closest('tr');
  const ds = tr.dataset.dateRow;
  const existing = tr.nextElementSibling;
  if (existing && existing.classList.contains('matrix-day-detail')) {
    existing.remove();
    tr.classList.remove('mdd-open');
    return;
  }
  tr.classList.add('mdd-open');

  const colCount = tr.querySelectorAll('td').length;
  const detailTr = document.createElement('tr');
  detailTr.className = 'matrix-day-detail';

  const outerTd = document.createElement('td');
  outerTd.colSpan = colCount;

  const wrap = document.createElement('div');
  wrap.className = 'mdd-wrap';

  // ── Колонка поступлений ──
  const incCol = document.createElement('div');
  incCol.className = 'mdd-col';
  const incTitle = document.createElement('div');
  incTitle.className = 'mdd-col-title';
  incTitle.textContent = 'поступления';
  incCol.appendChild(incTitle);

  state.sources.forEach(function(s) {
    const cell = getCell(ds, s.id);
    const n = parseFloat(cell.value);
    const hasVal = !isNaN(n) && n !== 0;
    const row = document.createElement('div');
    row.className = 'mdd-row' + (isSourceActive(s, ds) ? '' : ' inactive');
    const code = document.createElement('span');
    code.className = 'entry-code';
    code.textContent = s.code;
    const inp = document.createElement('input');
    inp.className = 'entry-input mdd-inp' + (hasVal ? ' has-value' : '');
    inp.type = 'number'; inp.inputMode = 'numeric';
    inp.dataset.date = ds; inp.dataset.src = s.id;
    inp.value = hasVal ? Math.round(n) : '';
    inp.placeholder = '—';
    inp.addEventListener('focus', function() { this.select(); });
    inp.addEventListener('keydown', function(ev) { if (ev.key === 'Enter') this.blur(); });
    inp.addEventListener('change', function() {
      setCell(this.dataset.date, this.dataset.src, this.value);
      const n2 = parseFloat(this.value);
      this.className = 'entry-input mdd-inp' + ((!isNaN(n2) && n2 !== 0) ? ' has-value' : '');
      const mx = document.querySelector('input[data-date="' + ds + '"][data-src="' + s.id + '"]:not(.mdd-inp)');
      if (mx) { mx.value = this.value; mx.className = (!isNaN(n2) && n2 !== 0) ? 'has-value' : 'zero'; }
      recalcAllTotals();
    });
    row.appendChild(code); row.appendChild(inp);
    incCol.appendChild(row);
  });

  // ── Колонка трат ──
  const spendCol = document.createElement('div');
  spendCol.className = 'mdd-col';
  const spendTitle = document.createElement('div');
  spendTitle.className = 'mdd-col-title';
  spendTitle.textContent = 'траты';
  spendCol.appendChild(spendTitle);

  // ТРТ из fc.expenses
  const dayExps = buildDayExpensesMap(daysInYear(state.year))[ds] || [];
  dayExps.forEach(function(e) {
    const eRow = document.createElement('div');
    eRow.className = 'mdd-row';
    const eLbl = document.createElement('span');
    eLbl.style.cssText = 'flex:1;font-family:var(--mono);font-size:10px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;';
    eLbl.textContent = e.label || '—';
    const eInp = document.createElement('input');
    eInp.className = 'entry-input spend has-value mdd-inp';
    eInp.type = 'number'; eInp.inputMode = 'numeric';
    eInp.dataset.expIdx = e.expIdx;
    eInp.value = Math.round(e.sum);
    eInp.placeholder = '—';
    eInp.addEventListener('focus', function() { this.select(); });
    eInp.addEventListener('keydown', function(ev) { if (ev.key === 'Enter') this.blur(); });
    eInp.addEventListener('change', function() {
      const idx = parseInt(this.dataset.expIdx);
      const v = parseFloat(this.value);
      state.fc.expenses[idx].sum = (!isNaN(v) && v > 0) ? String(Math.round(v)) : '';
      this.className = 'entry-input spend mdd-inp' + ((!isNaN(v) && v > 0) ? ' has-value' : '');
      save(); recalcAllTotals();
    });
    eRow.appendChild(eLbl); eRow.appendChild(eInp);
    spendCol.appendChild(eRow);
  });

  // лимит (read-only)
  const limitV = parseFloat(state.fc && state.fc.limit) || 0;
  if (limitV > 0) {
    const limRow = document.createElement('div');
    limRow.className = 'mdd-row';
    const limLbl = document.createElement('span');
    limLbl.style.cssText = 'flex:1;font-family:var(--mono);font-size:10px;color:var(--warn);';
    limLbl.textContent = 'лимит';
    const limVal = document.createElement('span');
    limVal.style.cssText = 'font-family:var(--mono);font-size:12px;font-weight:600;color:rgba(251,191,36,0.85);';
    limVal.textContent = '−' + fmtNum(limitV);
    limRow.appendChild(limLbl); limRow.appendChild(limVal);
    spendCol.appendChild(limRow);
  }

  // сумма трат — ручной ввод
  const spendV = parseFloat(state.spends[ds]) || 0;
  const spRow = document.createElement('div');
  spRow.className = 'mdd-row';
  const spLbl = document.createElement('span');
  spLbl.style.cssText = 'flex:1;font-family:var(--mono);font-size:10px;color:var(--muted);';
  spLbl.textContent = 'сумма трат';
  const spInp = document.createElement('input');
  spInp.className = 'entry-input spend mdd-inp' + (spendV ? ' has-value' : '');
  spInp.type = 'number'; spInp.inputMode = 'numeric';
  spInp.dataset.spendDate = ds;
  spInp.value = spendV ? Math.round(spendV) : '';
  spInp.placeholder = '—';
  spInp.addEventListener('focus', function() { this.select(); });
  spInp.addEventListener('keydown', function(ev) { if (ev.key === 'Enter') this.blur(); });
  spInp.addEventListener('change', function() {
    const v = parseFloat(this.value);
    setSpend(ds, v);
    this.className = 'entry-input spend mdd-inp' + ((!isNaN(v) && v > 0) ? ' has-value' : '');
    const mx = document.querySelector('input[data-spend-date="' + ds + '"]:not(.mdd-inp)');
    if (mx) { mx.value = (!isNaN(v) && v > 0) ? Math.round(v) : ''; mx.className = (!isNaN(v) && v > 0) ? 'has-value' : ''; }
    save(); recalcAllTotals();
  });
  spRow.appendChild(spLbl); spRow.appendChild(spInp);
  spendCol.appendChild(spRow);

  wrap.appendChild(incCol);
  wrap.appendChild(spendCol);
  outerTd.appendChild(wrap);
  detailTr.appendChild(outerTd);
  tr.parentNode.insertBefore(detailTr, tr.nextSibling);
}

function toggleMonth(mo) {
  state.collapsedMonths[mo] = !state.collapsedMonths[mo];
  save();
  const rows = document.querySelectorAll('tr[data-month="' + mo + '"]');
  rows.forEach(function(r) {
    r.style.display = state.collapsedMonths[mo] ? 'none' : '';
  });
  const hdr = document.querySelector('tr.month-total-row[data-mo="' + mo + '"]');
  if (hdr) {
    const arrow = hdr.querySelector('.mo-arrow');
    if (arrow) arrow.textContent = state.collapsedMonths[mo] ? '▶' : '▼';
  }
}

function renderMatrix() {
  const wrap = document.getElementById('matrix-wrap');
  const days = daysInYear(state.year);
  const sources = state.sources;
  const td0 = today();
  const MONTHS_RU = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];

  let html = '<table id="matrix"><thead><tr>';
  html += '<th>дата</th>';
  html += '<th class="col-spend" style="color:var(--danger);">траты</th>';
  sources.forEach(function(s) { html += '<th>' + s.code + '</th>'; });
  html += '<th class="col-income-total" style="color:var(--warn);white-space:nowrap;">доходы</th>';
  html += '<th class="col-morning" style="color:var(--muted2);white-space:nowrap;">утро</th>';
  html += '<th class="col-evening" style="color:var(--muted2);white-space:nowrap;">вечер</th>';
  html += '<th class="mo-sum col-row-total" style="color:var(--warn);white-space:nowrap;">дельта</th>';
  html += '</tr></thead><tbody>';

  // pre-calc month buckets
  const monthTotals = {};
  days.forEach(function(ds) {
    const mo = new Date(ds).getMonth();
    if (!monthTotals[mo]) { monthTotals[mo] = { row: 0, spend: 0 }; sources.forEach(function(s){ monthTotals[mo][s.id] = 0; }); }
    sources.forEach(function(s) {
      const v = parseFloat(getCell(ds, s.id).value);
      if (!isNaN(v) && v > 0) { monthTotals[mo][s.id] += v; if (!s.noBalance) monthTotals[mo].row += v; }
    });
    const sp = parseFloat(state.spends[ds]) || 0;
    monthTotals[mo].spend += sp;
  });

  // pre-calc running balance for month boundaries
  const fc = state.fc || {};
  let runBalPre = parseFloat(fc.balVal) || 0;
  const monthBals = {}; // mo -> { start, end }
  let curMo = -1;
  days.forEach(function(ds) {
    const mo = new Date(ds).getMonth();
    if (mo !== curMo) { monthBals[mo] = { start: runBalPre }; curMo = mo; }
    const spend = parseFloat(state.spends[ds]) || 0;
    let inc = 0;
    sources.forEach(function(s) { if (s.noBalance) return; const v = parseFloat(getCell(ds, s.id).value); if (!isNaN(v)) inc += v; });
    runBalPre = runBalPre - spend + inc;
    monthBals[mo].end = runBalPre;
  });

  function monthTotalRow(mo, placement) {
    const mt = monthTotals[mo] || { row: 0, spend: 0 };
    const mb = monthBals[mo] || { start: 0, end: 0 };
    const collapsed = state.collapsedMonths[mo];
    const arrow = placement === 'before' ? (collapsed ? '▶' : '▼') : '';
    const delta = mt.row - mt.spend;

    const S = 'font-family:var(--mono);font-size:11px;font-weight:600;text-align:right;padding:0 10px;white-space:nowrap;';

    let r = '<tr class="month-total-row" data-mo="' + mo + '" onclick="toggleMonth(' + mo + ')" style="cursor:pointer;">';
    // date
    r += '<td style="padding:4px 8px;color:var(--accent2);font-size:11px;font-weight:600;letter-spacing:0.05em;user-select:none;white-space:nowrap;">' +
      '<span class="mo-arrow" style="margin-right:5px;font-size:9px;opacity:0.6;">' + arrow + '</span>' +
      MONTHS_RU[mo].slice(0, 3).toUpperCase() + '</td>';
    // траты (col-spend position — перед источниками, видна в свёрнутом режиме)
    r += '<td class="col-spend" style="padding:0 10px;text-align:right;font-family:var(--mono);font-size:11px;font-weight:600;white-space:nowrap;color:' + (mt.spend > 0 ? 'rgba(248,113,113,0.9)' : 'var(--muted)') + ';">' + (mt.spend > 0 ? fmtNum(mt.spend) : '—') + '</td>';
    // source cols (скрыты в свёрнутом режиме через CSS)
    sources.forEach(function(s) {
      const v = mt[s.id] || 0;
      r += '<td style="' + S + 'color:' + (v > 0 ? 'var(--warn)' : 'var(--muted)') + ';opacity:0.7;">' + (v > 0 ? fmtNum(v) : '') + '</td>';
    });
    // доходы (col-income-total position — видна в свёрнутом режиме)
    r += '<td class="col-income-total" style="' + S + 'color:' + (mt.row > 0 ? 'var(--warn)' : 'var(--muted)') + ';">' + (mt.row > 0 ? fmtNum(mt.row) : '—') + '</td>';
    // утро (col-morning position — баланс начала месяца)
    r += '<td class="col-morning" style="' + S + 'color:' + (mb.start < 0 ? 'var(--danger)' : 'var(--muted2)') + ';">' + (mb.start !== 0 ? fmtNum(mb.start) : '—') + '</td>';
    // вечер (col-evening position — баланс конца месяца)
    r += '<td class="col-evening" style="' + S + 'color:' + (mb.end < 0 ? 'var(--danger)' : mb.end >= mb.start ? 'var(--accent)' : 'var(--muted2)') + ';">' + (mb.end !== 0 ? fmtNum(mb.end) : '—') + '</td>';
    // дельта (col-row-total, sticky right)
    const deltaColor = delta > 0 ? 'var(--accent)' : delta < 0 ? 'var(--danger)' : 'var(--warn)';
    r += '<td class="col-row-total" style="' + S + 'color:' + deltaColor + ';">' + (delta !== 0 ? (delta > 0 ? '+' : '') + fmtNum(delta) : '—') + '</td>';
    r += '</tr>';
    return r;
  }

  // pre-calc running balance for day rows
  let runBal = parseFloat(fc.balVal) || 0;
  const balances = {}; // ds -> { morning, evening }
  days.forEach(function(ds) {
    const morning = runBal;
    const spend = parseFloat(state.spends[ds]) || 0;
    let inc = 0;
    sources.forEach(function(s) { if (s.noBalance) return; const v = parseFloat(getCell(ds, s.id).value); if (!isNaN(v)) inc += v; });
    const evening = morning - spend + inc;
    balances[ds] = { morning: morning, evening: evening };
    runBal = evening;
  });

  let prevMonth2 = -1;
  days.forEach(function(ds) {
    const d = new Date(ds);
    const mo = d.getMonth();
    const dow = d.getDay();
    const isWeekend = isNonWorkday(ds);
    const isPast = ds < td0;
    const isToday = ds === td0;

    if (mo !== prevMonth2) { html += monthTotalRow(mo, 'before'); }
    prevMonth2 = mo;

    const collapsed = state.collapsedMonths[mo];
    let cls = isPast ? 'past' : isToday ? 'today' : 'future';
    if (isWeekend) cls += ' weekend';

    html += '<tr class="' + cls + '" data-month="' + mo + '" data-date-row="' + ds + '"' + (collapsed ? ' style="display:none"' : '') + '>';
    html += '<td onclick="toggleDayDetail(event,this)">' + fmtDate(ds) + '</td>';

    // spend col
    const spendV = parseFloat(state.spends[ds]) || 0;
    const spendCls = spendV !== 0 ? 'has-value' : '';
    html += '<td class="col-spend"><input type="number" data-spend-date="' + ds + '" value="' + (spendV !== 0 ? Math.round(spendV) : '') + '" class="' + spendCls + '" placeholder="" inputmode="numeric"></td>';

    let rowTotal = 0;
    sources.forEach(function(s) {
      const cell = getCell(ds, s.id);
      const v = cell.value;
      const n = parseFloat(v);
      const hasVal = !isNaN(n) && n !== 0;
      if (hasVal && !s.noBalance) rowTotal += n;
      const inputCls = hasVal ? 'has-value' : (!v ? 'zero' : '');
      html += '<td class="m-cell"><input type="number" data-date="' + ds + '" data-src="' + s.id + '"' +
        ' value="' + (hasVal ? Math.round(n) : '') + '"' +
        ' class="' + inputCls + '"' +
        ' placeholder="" inputmode="numeric"></td>';
    });

    // income total col
    const incColor = rowTotal > 0 ? 'var(--warn)' : 'var(--muted)';
    html += '<td class="col-income-total" style="color:' + incColor + ';">' + (rowTotal > 0 ? fmtNum(rowTotal) : '') + '</td>';

    // morning/evening balance
    const bals = balances[ds];
    const mornColor = bals.morning < 0 ? 'var(--danger)' : 'var(--muted2)';
    const evenColor = bals.evening < 0 ? 'var(--danger)' : bals.evening > bals.morning ? 'var(--accent)' : 'var(--muted2)';
    html += '<td class="col-morning" style="color:' + mornColor + ';">' + (bals.morning !== 0 ? fmtNum(bals.morning) : '') + '</td>';
    html += '<td class="col-evening" style="color:' + evenColor + ';">' + (bals.evening !== 0 ? fmtNum(bals.evening) : '') + '</td>';

    const dayResult = rowTotal - spendV;
    const dayResColor = dayResult > 0 ? 'var(--accent)' : dayResult < 0 ? 'var(--danger)' : 'var(--muted)';
    const dayResText = dayResult > 0 ? '+' + fmtNum(dayResult) : dayResult < 0 ? fmtNum(dayResult) : '';
    html += '<td class="col-row-total" style="padding:0 8px;text-align:right;font-family:var(--mono);font-size:11px;color:' + dayResColor + ';">' + dayResText + '</td>';
    html += '</tr>';
  });

  // year totals
  let grandTotal = 0;
  let yearSpend = 0;
  const srcTotals = {};
  sources.forEach(function(s) { srcTotals[s.id] = 0; });
  days.forEach(function(ds) {
    sources.forEach(function(s) { const v = parseFloat(getCell(ds, s.id).value); if (!isNaN(v) && v > 0) { srcTotals[s.id] += v; grandTotal += v; } });
    yearSpend += parseFloat(state.spends[ds]) || 0;
  });
  const yearStart = monthBals[0] ? monthBals[0].start : 0;
  const yearEnd = monthBals[11] ? monthBals[11].end : 0;
  const yearDelta = grandTotal - yearSpend;
  const YS = 'font-family:var(--mono);font-size:11px;font-weight:700;text-align:right;padding:0 10px;white-space:nowrap;';

  html += '<tr class="col-total"><td style="color:var(--accent2);font-size:10px;letter-spacing:0.05em;padding:4px 8px;">ГОД</td>';
  // траты (col-spend position)
  html += '<td class="col-spend" style="' + YS + 'color:' + (yearSpend > 0 ? 'rgba(248,113,113,0.9)' : 'var(--muted)') + ';">' + (yearSpend > 0 ? fmtNum(yearSpend) : '—') + '</td>';
  // per-source totals
  sources.forEach(function(s) {
    const total = srcTotals[s.id] || 0;
    html += '<td class="m-cell" style="padding:0 6px;text-align:right;">' +
      '<span style="color:var(--warn);font-family:var(--mono);font-size:11px;font-weight:600;">' +
      (total > 0 ? fmtNum(total) : '—') + '</span></td>';
  });
  // доходы (col-income-total position)
  html += '<td class="col-income-total" style="' + YS + 'color:' + (grandTotal > 0 ? 'var(--warn)' : 'var(--muted)') + ';">' + (grandTotal > 0 ? fmtNum(grandTotal) : '—') + '</td>';
  // утро 1 янв (col-morning position)
  html += '<td class="col-morning" style="' + YS + 'color:' + (yearStart < 0 ? 'var(--danger)' : 'var(--muted2)') + ';">' + (yearStart !== 0 ? fmtNum(yearStart) : '—') + '</td>';
  // вечер 31 дек (col-evening position)
  html += '<td class="col-evening" style="' + YS + 'color:' + (yearEnd < 0 ? 'var(--danger)' : yearEnd >= yearStart ? 'var(--accent)' : 'var(--muted2)') + ';">' + (yearEnd !== 0 ? fmtNum(yearEnd) : '—') + '</td>';
  // дельта (col-row-total, sticky)
  const yearDeltaColor = yearDelta > 0 ? 'var(--accent)' : yearDelta < 0 ? 'var(--danger)' : 'var(--warn)';
  html += '<td class="col-row-total" style="' + YS + 'font-size:12px;color:' + yearDeltaColor + ';">' + (yearDelta !== 0 ? (yearDelta > 0 ? '+' : '') + fmtNum(yearDelta) : '—') + '</td>';
  html += '</tr></tbody></table>';
  wrap.innerHTML = html;

  // restore collapsed-sources state (default: collapsed)
  const matrix = document.getElementById('matrix');
  const colBtn = document.getElementById('btn-collapse-src');
  if (state.sourcesCollapsed) {
    matrix.classList.add('sources-collapsed');
    if (colBtn) { colBtn.classList.add('active'); colBtn.textContent = '⊞'; }
  } else {
    matrix.classList.remove('sources-collapsed');
    if (colBtn) { colBtn.classList.remove('active'); colBtn.textContent = '⊟'; }
  }

  setTimeout(function() {
    const rows = wrap.querySelectorAll('tr.today');
    if (rows.length) rows[0].scrollIntoView({ block: 'center' });
  }, 50);

  wrap.querySelectorAll('input[data-date]').forEach(function(inp) {
    inp.addEventListener('change', function() {
      setCell(this.dataset.date, this.dataset.src, this.value);
      const row = this.closest('tr');
      let rowTotal = 0;
      row.querySelectorAll('input[data-date]').forEach(function(i) {
        const v = parseFloat(i.value); if (!isNaN(v)) rowTotal += v;
      });
      const totalCell = row.lastElementChild;
      totalCell.textContent = rowTotal > 0 ? fmtNum(rowTotal) : '';
      totalCell.className = rowTotal > 0 ? 'm-total' : 'zero';
      const n = parseFloat(this.value);
      this.className = (!isNaN(n) && n !== 0) ? 'has-value' : 'zero';

      // recalc month total row
      const mo = new Date(this.dataset.date).getMonth();
      const daysInMo = daysInYear(state.year).filter(function(ds) { return new Date(ds).getMonth() === mo; });
      const moTotals = {};
      sources.forEach(function(s) { moTotals[s.id] = 0; });
      moTotals.row = 0;
      daysInMo.forEach(function(ds) {
        sources.forEach(function(s) {
          const inp2 = document.querySelector('input[data-date="' + ds + '"][data-src="' + s.id + '"]');
          const v = parseFloat(inp2 ? inp2.value : getCell(ds, s.id).value);
          if (!isNaN(v) && v !== 0) { moTotals[s.id] += v; moTotals.row += v; }
        });
      });
      const hdr = document.querySelector('tr.month-total-row[data-mo="' + mo + '"]');
      if (hdr) {
        const cells = hdr.querySelectorAll('td');
        sources.forEach(function(s, i) {
          const v = moTotals[s.id] || 0;
          cells[i + 2].textContent = v !== 0 ? fmtNum(v) : '';
          cells[i + 2].style.color = v !== 0 ? 'var(--warn)' : 'var(--muted)';
        });
        // обновить доходы в col-income-total (N+2 от начала)
        cells[sources.length + 2].textContent = moTotals.row !== 0 ? fmtNum(moTotals.row) : '';
        cells[sources.length + 2].style.color = moTotals.row > 0 ? 'var(--accent2)' : 'var(--muted)';
      }
    });
    inp.addEventListener('focus', function() {
      this.select();
      showMoveOverlay(this, this.dataset.date, this.dataset.src);
    });
  });

  // spend column events
  wrap.querySelectorAll('input[data-spend-date]').forEach(function(inp) {
    inp.addEventListener('change', function() {
      const ds = this.dataset.spendDate;
      const v = parseFloat(this.value);
      setSpend(ds, v);
      this.className = (!isNaN(v) && v !== 0) ? 'has-value' : '';
      save();
    });
    inp.addEventListener('focus', function() { this.select(); });
  });
  wrap.querySelectorAll('tr.past .m-cell input').forEach(function(inp) {
    const cell = state.cells[inp.dataset.date + '|' + inp.dataset.src];
    if (!cell || !cell.history || cell.history.length === 0) return;
    inp.addEventListener('mouseenter', function(e) { showErrTooltip(e, this.dataset.date, this.dataset.src); });
    inp.addEventListener('mousemove', posErrTooltip);
    inp.addEventListener('mouseleave', hideErrTooltip);
    inp.addEventListener('touchend', function(e) {
      const tt = document.getElementById('err-tooltip');
      if (tt.style.display === 'block') {
        hideErrTooltip();
      } else {
        const touch = e.changedTouches[0];
        showErrTooltip({ clientX: touch.clientX, clientY: touch.clientY }, this.dataset.date, this.dataset.src);
        e.preventDefault();
      }
    });
  });

  // tap outside tooltip to close on mobile
  document.addEventListener('touchstart', function(e) {
    const tt = document.getElementById('err-tooltip');
    if (tt.style.display === 'block' && !tt.contains(e.target)) {
      hideErrTooltip();
    }
  });

  // add edit markers to date cells
  renderMarkers(days);
  // show timeline
  renderTimeline(days);
  // update month summary rows after DOM is built
  setTimeout(recalcAllTotals, 0);
}

// ── Edit markers ────────────────────────────────────────────────────────
function renderMarkers(days) {
  // find dates that have any edits
  const editDates = new Set();
  Object.keys(state.cells).forEach(function(key) {
    const cell = state.cells[key];
    if (cell.history && cell.history.length > 0) {
      const ds = key.split('|')[0];
      // mark the date of each history entry
      cell.history.forEach(function(h) {
        editDates.add(new Date(h.ts).toISOString().split('T')[0]);
      });
    }
  });

  // add dots to date cells
  days.forEach(function(ds) {
    if (!editDates.has(ds)) return;
    const row = document.querySelector('tr[data-date-row="' + ds + '"]');
    if (!row) return;
    const dateCell = row.firstElementChild;
    if (dateCell && !dateCell.querySelector('.edit-dot')) {
      const dot = document.createElement('span');
      dot.className = 'edit-dot';
      dateCell.appendChild(dot);
    }
  });
}

// ── Timeline slider ─────────────────────────────────────────────────────
let tlDragging = false;
let viewDate = null;
let tlMoveThrottle = null;
function tlMoveThrottled(clientY) {
  if (tlMoveThrottle) return;
  tlMoveThrottle = requestAnimationFrame(function() { tlMove(clientY); tlMoveThrottle = null; });
}

function renderTimeline(days) {
  const tl = document.getElementById('timeline');
  const track = document.getElementById('timeline-track');
  tl.style.display = 'block';
  track.innerHTML = '';

  // collect exact edit timestamps from cell history (h.ts = ISO string)
  const tsSet = new Set();
  Object.keys(state.cells).forEach(function(key) {
    const cell = state.cells[key];
    if (!cell.history) return;
    cell.history.forEach(function(h) {
      if (!h.ts) return;
      const t = new Date(h.ts).getTime();
      if (!isNaN(t) && t > 0) tsSet.add(t);
    });
  });
  // spend history timestamps
  Object.keys(state.spendHistory || {}).forEach(function(ds) {
    (state.spendHistory[ds] || []).forEach(function(h) {
      if (!h.ts) return;
      const t = new Date(h.ts).getTime();
      if (!isNaN(t) && t > 0) tsSet.add(t);
    });
  });
  // forecast calc / edit days (stored as date strings → end-of-day so they sit after the action)
  (state.actionLog || []).forEach(function(ds) {
    if (!ds) return;
    const t = new Date(ds + 'T23:59:59').getTime();
    if (!isNaN(t) && t > 0) tsSet.add(t);
  });

  if (tsSet.size === 0) return;

  const range = getDataRange();
  const minTs = range.min;
  const maxTs = Math.min(range.max, Date.now());
  const span = maxTs - minTs || 1;

  // deduplicate to one marker per minute (avoid stacking), sort ascending
  const uniqueTs = Array.from(tsSet).filter(function(t) { return t <= maxTs; }).sort(function(a,b){return a-b;});
  uniqueTs.forEach(function(ts) {
    const pct = (ts - minTs) / span * 100;
    const marker = document.createElement('div');
    marker.className = 'tl-marker';
    marker.style.top = pct + '%';
    marker.title = new Date(ts).toLocaleDateString('ru');
    marker.dataset.ts = ts;
    marker.addEventListener('click', function(e) {
      e.stopPropagation();
      setViewDate(new Date(parseInt(this.dataset.ts)).toISOString());
    });
    track.appendChild(marker);
  });

  // drag on timeline
  tl.addEventListener('mousedown', tlMouseDown);
  tl.addEventListener('touchstart', tlTouchStart, { passive: true });
}

function tlGetPct(clientY) {
  const tl = document.getElementById('timeline');
  const rect = tl.getBoundingClientRect();
  return Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
}

function tlMouseDown(e) {
  tlDragging = true;
  tlMove(e.clientY);
  document.addEventListener('mousemove', tlMouseMove);
  document.addEventListener('mouseup', tlMouseUp);
}
function tlMouseMove(e) { if (tlDragging) tlMoveThrottled(e.clientY); }
function tlMouseUp() {
  tlDragging = false;
  document.removeEventListener('mousemove', tlMouseMove);
  document.removeEventListener('mouseup', tlMouseUp);
}
function tlTouchStart(e) {
  tlMove(e.touches[0].clientY);
  document.addEventListener('touchmove', tlTouchMove, { passive: true });
  document.addEventListener('touchend', tlTouchEnd);
}
function tlTouchMove(e) { tlMoveThrottled(e.touches[0].clientY); }
function tlTouchEnd() {
  document.removeEventListener('touchmove', tlTouchMove);
  document.removeEventListener('touchend', tlTouchEnd);
}

function tlMove(clientY) {
  const pct = tlGetPct(clientY);
  const cursor = document.getElementById('tl-cursor');
  cursor.style.top = (pct * 100) + '%';

  // find timestamp at this position — cap max at today (future forecast dates not useful for history)
  const dr = getDataRange();
  const minTs = dr.min;
  const maxTs = Math.min(dr.max, Date.now());
  const ts = minTs + pct * (maxTs - minTs);
  const dt = new Date(ts);
  const label = document.getElementById('tl-label');
  label.style.display = 'block';
  label.style.top = (clientY - 10) + 'px';
  label.textContent = dt.toLocaleDateString('ru') + ' ' + dt.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });

  setViewDate(dt.toISOString(), true);
}

function getDataRange() {
  const times = [];
  Object.keys(state.cells).forEach(function(key) {
    const ds = key.split('|')[0];
    if (ds && ds.length === 10) { const t = new Date(ds).getTime(); if (!isNaN(t)) times.push(t); }
  });
  Object.keys(state.spends || {}).forEach(function(ds) {
    const t = new Date(ds).getTime(); if (!isNaN(t)) times.push(t);
  });
  if (!times.length) { const now = Date.now(); return { min: now - 86400000, max: now }; }
  return { min: Math.min.apply(null, times), max: Math.max.apply(null, times) };
}
function getMinTs() { return getDataRange().min; }

function setViewDate(isoStr, preview) {
  viewDate = isoStr;
  const ts = new Date(isoStr).getTime();

  // only update visible inputs for performance
  document.querySelectorAll('tr:not([style*="display:none"]) input[data-date][data-src]').forEach(function(inp) {
    const key = inp.dataset.date + '|' + inp.dataset.src;
    const cell = state.cells[key];
    if (!cell) { inp.value = ''; inp.className = 'zero'; return; }

    let val = '';
    const hist = cell.history || [];
    for (var i = 0; i < hist.length; i++) {
      if (new Date(hist[i].ts).getTime() <= ts) val = hist[i].value;
    }
    if (new Date(cell.history && cell.history.length ? cell.history[cell.history.length-1].ts : 0).getTime() <= ts) {
      val = cell.value;
    }
    const n = parseFloat(val);
    inp.value = (!isNaN(n) && n !== 0) ? Math.round(n) : '';
    inp.className = (!isNaN(n) && n !== 0) ? 'has-value' : 'zero';
  });

  // update spend inputs to historical values
  document.querySelectorAll('input[data-spend-date]').forEach(function(inp) {
    const v = getSpendAt(inp.dataset.spendDate, ts);
    inp.value = v > 0 ? Math.round(v) : '';
    inp.className = v > 0 ? 'has-value' : '';
  });

  document.getElementById('matrix').classList.add('history-mode');
  if (!preview) document.getElementById('tl-label').style.display = 'none';
  recalcAllTotals();
}

function recalcAllTotals() {
  const sources = state.sources;
  const days = daysInYear(state.year);

  // in history mode reconstruct value at viewDate timestamp directly from state (no DOM queries)
  const viewTs = viewDate ? new Date(viewDate).getTime() : 0;
  function getCellVal(ds, srcId) {
    if (!viewDate) return getCell(ds, srcId).value;
    const cell = state.cells[ds + '|' + srcId];
    if (!cell) return '';
    const hist = cell.history || [];
    let val = '';
    for (var _i = 0; _i < hist.length; _i++) {
      if (new Date(hist[_i].ts).getTime() <= viewTs) val = hist[_i].value;
    }
    const lastTs = hist.length ? new Date(hist[hist.length - 1].ts).getTime() : 0;
    if (lastTs <= viewTs) val = cell.value;
    return val;
  }

  let runBal = parseFloat((state.fc || {}).balVal) || 0;
  const monthSummary = {};
  let curMo = -1;

  days.forEach(function(ds) {
    const mo = new Date(ds).getMonth();
    if (mo !== curMo) {
      monthSummary[mo] = { spend: 0, income: 0, startBal: runBal, endBal: 0 };
      curMo = mo;
    }
    const spend = viewDate ? getSpendAt(ds, viewTs) : (parseFloat(state.spends[ds]) || 0);
    let inc = 0;
    sources.forEach(function(s) {
      if (s.noBalance) return;
      const v = parseFloat(getCellVal(ds, s.id));
      if (!isNaN(v)) inc += v;
    });
    monthSummary[mo].spend += spend;
    monthSummary[mo].income += inc;
    runBal = runBal - spend + inc;
    monthSummary[mo].endBal = runBal;
  });

  Object.keys(monthSummary).forEach(function(mo) {
    const ms = monthSummary[mo];
    const hdr = document.querySelector('tr.month-total-row[data-mo="' + mo + '"]');
    if (!hdr) return;

    // td[0]=name, td[1]=spend, td[2..n+1]=sources, td[n+2]=income, td[n+3]=morning, td[n+4]=evening, td[n+5]=delta
    const allTds = hdr.querySelectorAll('td');
    const n = sources.length;

    const spCell = allTds[1];
    if (spCell) { spCell.textContent = ms.spend > 0 ? fmtNum(ms.spend) : '—'; spCell.style.color = ms.spend > 0 ? 'rgba(248,113,113,0.9)' : 'var(--muted)'; }

    sources.forEach(function(s, i) {
      const daysInMo = days.filter(function(ds) { return new Date(ds).getMonth() === parseInt(mo); });
      let v = 0;
      daysInMo.forEach(function(ds) { const val = parseFloat(getCellVal(ds, s.id)); if (!isNaN(val)) v += val; });
      const cell = allTds[i + 2];
      if (cell) { cell.textContent = v !== 0 ? fmtNum(v) : ''; cell.style.color = v !== 0 ? 'var(--warn)' : 'var(--muted)'; }
    });

    const incCell = allTds[n + 2];
    if (incCell) { incCell.textContent = ms.income > 0 ? fmtNum(ms.income) : '—'; incCell.style.color = ms.income > 0 ? 'var(--warn)' : 'var(--muted)'; }
    const mornCell = allTds[n + 3];
    if (mornCell) { mornCell.textContent = ms.startBal !== 0 ? fmtNum(ms.startBal) : '—'; mornCell.style.color = ms.startBal < 0 ? 'var(--danger)' : 'var(--muted2)'; }
    const evenCell = allTds[n + 4];
    if (evenCell) { evenCell.textContent = ms.endBal !== 0 ? fmtNum(ms.endBal) : '—'; evenCell.style.color = ms.endBal < 0 ? 'var(--danger)' : ms.endBal > ms.startBal ? 'var(--accent)' : 'var(--muted2)'; }
    const delta = ms.income - ms.spend;
    const deltaCell = allTds[n + 5];
    if (deltaCell) { deltaCell.textContent = delta !== 0 ? (delta > 0 ? '+' : '') + fmtNum(delta) : '—'; deltaCell.style.color = delta > 0 ? 'var(--accent)' : delta < 0 ? 'var(--danger)' : 'var(--warn)'; }
  });

  // recalc visible day row totals
  days.forEach(function(ds) {
    const row = document.querySelector('tr[data-date-row="' + ds + '"]');
    if (!row || row.style.display === 'none') return;
    let total = 0;
    const noBalIds = new Set(state.sources.filter(function(s) { return s.noBalance; }).map(function(s) { return s.id; }));
    row.querySelectorAll('input[data-date]').forEach(function(inp) {
      if (noBalIds.has(inp.dataset.src)) return;
      const v = parseFloat(inp.value); if (!isNaN(v)) total += v;
    });
    // income col
    const incCell = row.querySelector('.col-income-total');
    if (incCell) { incCell.textContent = total > 0 ? fmtNum(total) : ''; incCell.style.color = total > 0 ? 'var(--warn)' : 'var(--muted)'; }
    // day result col
    const spendInp = row.querySelector('input[data-spend-date]');
    const spend = spendInp ? (parseFloat(spendInp.value) || 0) : (parseFloat((state.spends || {})[ds]) || 0);
    const result = total - spend;
    const last = row.querySelector('.col-row-total');
    if (last) {
      last.textContent = result !== 0 ? (result > 0 ? '+' : '') + fmtNum(result) : '';
      last.style.color = result > 0 ? 'var(--accent)' : result < 0 ? 'var(--danger)' : 'var(--muted)';
      last.className = 'col-row-total';
    }
  });
}

// ── Error tooltips on past cells ─────────────────────────────────────────
function showErrTooltip(e, date, srcId) {
  const cell = state.cells[date + '|' + srcId];
  if (!cell || !cell.history || cell.history.length === 0) return;

  const tt = document.getElementById('err-tooltip');
  const currentVal = parseFloat(cell.value);
  const firstVal = parseFloat(cell.history[0].value !== '' ? cell.history[0].value : (cell.history[1] ? cell.history[1].value : cell.value));

  let html = '';
  // history list
  const allVersions = cell.history.concat([{ value: cell.value, ts: new Date().toISOString(), current: true }]);
  allVersions.forEach(function(h, i) {
    const v = parseFloat(h.value);
    const vStr = (!isNaN(v) && v !== 0) ? fmtNum(v) : '—';
    const ts = h.current ? 'сейчас' : fmtTs(h.ts);
    html += '<div class="err-tt-row"><span class="err-tt-ts">' + ts + '</span><span class="err-tt-val">' + vStr + '</span></div>';
  });

  // delta: current (fact) vs first (forecast)
  if (!isNaN(currentVal) && !isNaN(firstVal) && firstVal !== 0) {
    const delta = currentVal - firstVal;
    const cls = delta > 0 ? 'err-tt-delta-neg' : delta < 0 ? 'err-tt-delta-pos' : 'err-tt-delta-zero';
    const sign = delta > 0 ? '+' : '';
    html += '<hr class="err-tt-sep">';
    html += '<div class="err-tt-row"><span class="err-tt-ts">Δ прогноз→факт</span><span class="' + cls + '">' + sign + fmtNum(delta) + '</span></div>';
  }

  tt.innerHTML = html;
  tt.style.display = 'block';
  posErrTooltip(e);
}

function posErrTooltip(e) {
  const tt = document.getElementById('err-tooltip');
  if (window.innerWidth < 480) {
    // mobile: center horizontally, position near tap
    tt.style.left = Math.max(8, (window.innerWidth - tt.offsetWidth) / 2) + 'px';
    let y = e.clientY + 16;
    if (y + tt.offsetHeight > window.innerHeight - 8) y = e.clientY - tt.offsetHeight - 8;
    tt.style.top = Math.max(8, y) + 'px';
  } else {
    let x = e.clientX + 12, y = e.clientY + 12;
    if (x + tt.offsetWidth > window.innerWidth - 8) x = e.clientX - tt.offsetWidth - 8;
    if (y + tt.offsetHeight > window.innerHeight - 8) y = e.clientY - tt.offsetHeight - 8;
    tt.style.left = x + 'px';
    tt.style.top = y + 'px';
  }
}

function hideErrTooltip() {
  document.getElementById('err-tooltip').style.display = 'none';
}

// ── Move overlay ───────────────────────────────────────────────────────
let moveState = null; // { date, srcId, value, inputEl }

function showMoveOverlay(inp, date, srcId) {
  // hide previous highlight
  if (moveState && moveState.inputEl && moveState.inputEl !== inp) {
    moveState.inputEl.classList.remove('move-cell-highlight');
  }

  const v = parseFloat(inp.value);
  moveState = { date: date, srcId: srcId, value: isNaN(v) ? 0 : v, inputEl: inp };
  if (!isNaN(v) && v !== 0) inp.classList.add('move-cell-highlight');

  const overlay = document.getElementById('move-overlay');
  const rect = inp.getBoundingClientRect();
  const upBtn = document.getElementById('move-up');
  const dnBtn = document.getElementById('move-dn');
  // up arrow above cell, down arrow below cell
  upBtn.style.position = 'fixed';
  upBtn.style.left = (rect.left + rect.width / 2 - 16) + 'px';
  upBtn.style.top = (rect.top - 26) + 'px';
  dnBtn.style.position = 'fixed';
  dnBtn.style.left = (rect.left + rect.width / 2 - 16) + 'px';
  dnBtn.style.top = (rect.bottom) + 'px';
  overlay.classList.add('visible');
}

function hideMoveOverlay() {
  if (moveState && moveState.inputEl) {
    moveState.inputEl.classList.remove('move-cell-highlight');
  }
  moveState = null;
  document.getElementById('move-overlay').classList.remove('visible');
}

function moveCell(direction) {
  if (!moveState) return;
  const currentValue = parseFloat(moveState.inputEl ? moveState.inputEl.value : 0);
  if (isNaN(currentValue) || currentValue === 0) return;
  const days = daysInYear(state.year);
  const idx = days.indexOf(moveState.date);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= days.length) return;

  const newDate = days[newIdx];
  const { srcId, date } = moveState;

  // clear old cell (save as empty, keeping history)
  setCell(date, srcId, '');
  // set new cell
  setCell(newDate, srcId, String(currentValue));

  // update DOM — find old input and clear
  const oldInp = document.querySelector('input[data-date="' + date + '"][data-src="' + srcId + '"]');
  if (oldInp) {
    oldInp.value = '';
    oldInp.className = 'zero';
    // update old row total
    updateRowTotal(oldInp.closest('tr'));
  }

  // find new input and set
  const newInp = document.querySelector('input[data-date="' + newDate + '"][data-src="' + srcId + '"]');
  if (newInp) {
    newInp.value = Math.round(currentValue);
    newInp.className = 'has-value';
    updateRowTotal(newInp.closest('tr'));
    // reposition overlay
    moveState.date = newDate;
    moveState.inputEl = newInp;
    newInp.classList.add('move-cell-highlight');
    requestAnimationFrame(function() {
      const rect = newInp.getBoundingClientRect();
      document.getElementById('move-up').style.top = (rect.top - 26) + 'px';
      document.getElementById('move-up').style.left = (rect.left + rect.width / 2 - 16) + 'px';
      document.getElementById('move-dn').style.top = (rect.bottom) + 'px';
      document.getElementById('move-dn').style.left = (rect.left + rect.width / 2 - 16) + 'px';
      newInp.scrollIntoView({ block: 'nearest' });
    });
  }
}

function updateRowTotal(row) {
  if (!row) return;
  let total = 0;
  row.querySelectorAll('input[data-date]').forEach(function(i) {
    const v = parseFloat(i.value); if (!isNaN(v)) total += v;
  });
  const last = row.lastElementChild;
  last.textContent = total > 0 ? fmtNum(total) : '';
  last.className = total > 0 ? 'm-total' : 'zero';
}

// close overlay on tap outside
document.addEventListener('click', function(e) {
  if (!moveState) return;
  const overlay = document.getElementById('move-overlay');
  if (!overlay.contains(e.target) && e.target !== moveState.inputEl) {
    hideMoveOverlay();
  }
});

// ── Day mode ───────────────────────────────────────────────────────────

// Разворачивает крупные траты из прогноза по дням с сохранением лейблов
function buildDayExpensesMap(days) {
  const map = {};
  const expenses = (state.fc && state.fc.expenses) || [];
  const startDs = days[0], endDs = days[days.length - 1];
  expenses.forEach(function(r, expIdx) {
    const s = parseFloat(r.sum); if (isNaN(s) || s === 0) return;
    const label = r.label || '';
    if (r.freq === 'once') {
      if (r.date >= startDs && r.date <= endDs) {
        if (!map[r.date]) map[r.date] = [];
        map[r.date].push({ label: label, sum: s, expIdx: expIdx });
      }
      return;
    }
    const dt = parseLocalDate(r.date);
    while (true) {
      const ds = localDateStr(dt);
      if (ds > endDs) break;
      if (ds >= startDs) {
        if (!map[ds]) map[ds] = [];
        map[ds].push({ label: label, sum: s, expIdx: expIdx });
      }
      if (r.freq === 'monthly') dt.setMonth(dt.getMonth() + 1);
      else if (r.freq === 'yearly') dt.setFullYear(dt.getFullYear() + 1);
      else if (r.freq === 'weekly') dt.setDate(dt.getDate() + 7);
      else dt.setDate(dt.getDate() + 1);
    }
  });
  return map;
}

function renderDay() {
  const wrap = document.getElementById('day-wrap');
  const days = daysInYear(state.year);
  const td0 = today();
  const limit = parseFloat(state.fc && state.fc.limit) || 0;
  const dayExpMap = buildDayExpensesMap(days);
  let html = '';

  days.forEach(function(ds) {
    const isPast = ds < td0;
    const isToday = ds === td0;
    const cls = isPast ? 'past' : isToday ? 'today' : 'future';
    const expanded = isToday ? ' expanded' : '';

    // row total
    let total = 0;
    state.sources.forEach(function(s) {
      if (!isSourceActive(s, ds)) return;
      const v = parseFloat(getCell(ds, s.id).value);
      if (!isNaN(v)) total += v;
    });

    const spendV = parseFloat(state.spends[ds]) || 0;
    const dayExps = dayExpMap[ds] || [];
    // показываем лимит в строке если: есть трат ИЛИ день не прошёл
    const showLimit = limit > 0 && (spendV > 0 || !isPast);

    html += '<div class="day-card ' + cls + expanded + '" data-date="' + ds + '">';
    html += '<div class="day-header" onclick="toggleDay(this.parentElement)">';
    html += '<span class="day-date">' + fmtDate(ds) + '</span>';
    if (spendV > 0) html += '<span class="day-spend-hdr">−' + fmtNum(spendV) + '</span>';
    html += '<span class="day-total ' + (total === 0 ? 'zero' : '') + '">' + (total > 0 ? fmtNum(total) : '—') + '</span>';
    html += '<span class="day-chevron">▶</span>';
    html += '</div>';

    html += '<div class="day-entries">';

    // лимит (первым)
    if (showLimit) {
      html += '<div class="entry-row">';
      html += '<span class="entry-code" style="color:var(--warn);">ЛИМ</span>';
      html += '<span style="flex:1;font-family:var(--mono);font-size:11px;color:var(--muted);">лимит</span>';
      html += '<span style="font-family:var(--mono);font-size:12px;font-weight:600;color:rgba(251,191,36,0.85);">−' + fmtNum(limit) + '</span>';
      html += '</div>';
    }
    // крупные траты с названиями — редактируемые
    dayExps.forEach(function(e) {
      html += '<div class="entry-row">';
      html += '<span class="entry-code" style="color:var(--danger);">ТРТ</span>';
      html += '<span style="flex:1;font-family:var(--mono);font-size:11px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (e.label || '—') + '</span>';
      html += '<input class="entry-input spend has-value" type="number" inputmode="numeric"' +
        ' data-exp-idx="' + e.expIdx + '" value="' + Math.round(e.sum) + '" placeholder="—"' +
        ' style="width:80px;text-align:right;">';
      html += '</div>';
    });
    // поле трат — всегда редактируемое
    html += '<div class="entry-row">';
    html += '<span class="entry-code" style="color:var(--danger);">ТРАТ</span>';
    html += '<input class="entry-input spend' + (spendV > 0 ? ' has-value' : '') + '" type="number" inputmode="numeric"' +
      ' data-spend-date="' + ds + '" value="' + (spendV > 0 ? Math.round(spendV) : '') + '" placeholder="—">';
    html += '</div>';

    state.sources.forEach(function(s) {
      const active = isSourceActive(s, ds);
      const cell = getCell(ds, s.id);
      const v = cell.value;
      const n = parseFloat(v);
      const hasVal = !isNaN(n) && n !== 0;
      const inputCls = hasVal ? 'has-value' : '';
      const rowCls = active ? '' : ' inactive';
      html += '<div class="entry-row' + rowCls + '">';
      html += '<span class="entry-code">' + s.code + '</span>';
      html += '<input class="entry-input ' + inputCls + '" type="number" inputmode="numeric"' +
        ' data-date="' + ds + '" data-src="' + s.id + '"' +
        ' value="' + (hasVal ? Math.round(n) : '') + '" placeholder="—">';
      if (cell.history && cell.history.length > 0) {
        html += '<button class="entry-hist-btn" data-date="' + ds + '" data-src="' + s.id + '">hist</button>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });

  wrap.innerHTML = html;

  // scroll to today
  setTimeout(function() {
    const el = wrap.querySelector('.day-card.today');
    if (el) el.scrollIntoView({ block: 'start' });
  }, 50);

  // events
  wrap.querySelectorAll('.entry-input').forEach(function(inp) {
    inp.addEventListener('change', function() {
      setCell(this.dataset.date, this.dataset.src, this.value);
      // update day total
      const card = this.closest('.day-card');
      const ds = card.dataset.date;
      let total = 0;
      state.sources.forEach(function(s) {
        const v = parseFloat(getCell(ds, s.id).value);
        if (!isNaN(v)) total += v;
      });
      card.querySelector('.day-total').textContent = total > 0 ? fmtNum(total) : '—';
      card.querySelector('.day-total').className = 'day-total' + (total === 0 ? ' zero' : '');
      const n = parseFloat(this.value);
      this.className = 'entry-input' + ((!isNaN(n) && n !== 0) ? ' has-value' : '');
      // add hist button if needed
      const cell = getCell(ds, this.dataset.src);
      if (cell.history.length > 0 && !this.nextElementSibling) {
        const btn = document.createElement('button');
        btn.className = 'entry-hist-btn';
        btn.dataset.date = ds;
        btn.dataset.src = this.dataset.src;
        btn.textContent = 'hist';
        btn.addEventListener('click', function() { showHist(this.dataset.date, this.dataset.src); });
        this.parentElement.appendChild(btn);
      }
    });
    inp.addEventListener('focus', function() { this.select(); });
  });

  wrap.querySelectorAll('.entry-hist-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { showHist(this.dataset.date, this.dataset.src); });
  });

  function syncDaySpend(card) {
    const ds = card.dataset.date;
    const manInp = card.querySelector('.entry-input[data-spend-date]');
    const manV = manInp ? (parseFloat(manInp.value) || 0) : 0;
    setSpend(ds, manV);
    const hdr = card.querySelector('.day-header');
    let spHdr = hdr.querySelector('.day-spend-hdr');
    if (manV > 0) {
      if (!spHdr) { spHdr = document.createElement('span'); spHdr.className = 'day-spend-hdr'; hdr.insertBefore(spHdr, hdr.querySelector('.day-total')); }
      spHdr.textContent = '−' + fmtNum(manV);
    } else if (spHdr) { spHdr.remove(); }
    recalcAllTotals();
  }

  wrap.querySelectorAll('.entry-input[data-exp-idx]').forEach(function(inp) {
    function applyTrt() {
      const idx = parseInt(this.dataset.expIdx);
      const v = parseFloat(this.value);
      if (!isNaN(v) && v > 0) {
        state.fc.expenses[idx].sum = String(Math.round(v));
        this.className = 'entry-input spend has-value';
      } else {
        state.fc.expenses[idx].sum = '';
        this.className = 'entry-input spend';
      }
      save();
      recalcAllTotals();
    }
    inp.addEventListener('change', applyTrt);
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') { this.blur(); } });
    inp.addEventListener('focus', function() { this.select(); });
  });

  wrap.querySelectorAll('.entry-input.spend:not([data-exp-idx])').forEach(function(inp) {
    inp.addEventListener('change', function() {
      const v = parseFloat(this.value);
      this.className = 'entry-input spend' + ((!isNaN(v) && v > 0) ? ' has-value' : '');
      save();
      syncDaySpend(this.closest('.day-card'));
    });
    inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') { this.blur(); } });
    inp.addEventListener('focus', function() { this.select(); });
  });
}

function isSourceActive(s, date) {
  if (s.end && date > s.end) return false;
  if (s.start && date < s.start) return false;
  return true;
}

function toggleDay(card) {
  card.classList.toggle('expanded');
}

// ── Forecast panel ─────────────────────────────────────────────────────
function openForecast() {
  const fc = state.fc;
  document.getElementById('fc-bal-date').value = fc.balDate || today();
  document.getElementById('fc-bal-val').value = fc.balVal || '';
  document.getElementById('fc-limit').value = fc.limit || '';

function closeForecast() {
  state.fc.balDate = document.getElementById('fc-bal-date').value;
  state.fc.balVal = document.getElementById('fc-bal-val').value;
  state.fc.limit = document.getElementById('fc-limit').value;
  state.fc.expenses = getFcExpenses();

function renderFcExpenses() {
  const container = document.getElementById('fc-expenses');

function fcExpenseEl(e, idx) {
  const div = document.createElement('div');
  div.style.cssText = 'padding:8px 0;border-bottom:1px solid var(--border);';
  const row1 = document.createElement('div');
  row1.className = 'fc-entry';

  const dateInp = document.createElement('input');
  dateInp.type = 'date'; dateInp.className = 'fc-input';
  dateInp.style.cssText = 'max-width:120px;flex:none;'; dateInp.value = e.date || today();

  const sumInp = document.createElement('input');
  sumInp.type = 'number'; sumInp.className = 'fc-input';
  sumInp.style.cssText = 'max-width:90px;flex:none;color:var(--danger);';
  sumInp.value = e.sum || ''; sumInp.placeholder = 'сумма'; sumInp.inputMode = 'numeric';

  const labelInp = document.createElement('input');
  labelInp.type = 'text'; labelInp.className = 'fc-entry-label';
  labelInp.value = e.label || ''; labelInp.placeholder = 'название';

  const del = document.createElement('button');
  del.className = 'fc-del'; del.textContent = '×';
  del.onclick = function() { state.fc.expenses.splice(idx, 1); logAction(); save(); renderFcExpenses(); };

  row1.appendChild(dateInp); row1.appendChild(sumInp); row1.appendChild(labelInp); row1.appendChild(del);

  const freqLabels = ['раз','день','нед','мес','год'];
  const freqVals = ['once','daily','weekly','monthly','yearly'];
  const freqRow = document.createElement('div');
  freqRow.className = 'fc-freq';
  freqLabels.forEach(function(f, fi) {
    const btn = document.createElement('button');
    btn.className = 'fc-freq-btn' + ((e.freq || 'once') === freqVals[fi] ? ' active' : '');

    btn.onclick = function() {
      freqRow.querySelectorAll('.fc-freq-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    };
    freqRow.appendChild(btn);
  });

  div.appendChild(row1); div.appendChild(freqRow);
  return div;

function fcAddExpense() {
